<script>
/* ==========================================================================
   ESTAÇÃO DE ESTUDOS IA - COMUNICAÇÃO API E ACERVO CLOUD (js_ia_api.html)
   ========================================================================== */

window.acervoIA_Cache = [];

window.carregarAcervoGlobal = function() {
    const email = localStorage.getItem('usuario_email');
    if(!email) return;

    google.script.run.withSuccessHandler(resp => {
        if(resp.success) {
            window.acervoIA_Cache = resp.itens;
            
            if(typeof window.renderizarQuizzesSalvos === 'function') window.renderizarQuizzesSalvos();
            if(typeof window.renderizarResumosSalvos === 'function') window.renderizarResumosSalvos();
            if(typeof window.renderizarMapasSalvos === 'function') window.renderizarMapasSalvos();
            if(typeof window.renderizarCartoesSalvos === 'function') window.renderizarCartoesSalvos();
            
            // NOVO: Atualiza a Dashboard automaticamente sempre que a Nuvem sincroniza
            if(typeof window.renderizarMateriaisRecentesDashboard === 'function') window.renderizarMateriaisRecentesDashboard();
        }
    }).carregarAcervoIABanco(email);
};

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(window.carregarAcervoGlobal, 1000);
});

// Captura de Contexto Gamificado (Jornada/Módulo/Matéria)
function obterContextoEstudoAtual() {
    let jornada = localStorage.getItem('jornada_ativa_nome') || document.getElementById('titulo-jornada-ativa')?.innerText || 'Estudo Independente';
    let modulo = localStorage.getItem('modulo_ativo_nome') || 'Módulo Geral';
    let materia = localStorage.getItem('materia_ativa_nome') || 'Matéria Não Especificada';
    return { jornada, modulo, materia };
}

async function extrairTextoDasPaginasSelecionadas() {
  const selectedPages = pdfState.filter(function(p) { return p.selected; });
  const pagesToProcess = selectedPages.length > 0 ? selectedPages : pdfState;

  if (pagesToProcess.length === 0) throw new Error("A mesa de estudos está vazia. Adicione material primeiro.");

  let extractedText = "";
  let encontrouTextoReal = false; 
  
  for (let i = 0; i < pagesToProcess.length; i++) {
    const pDef = pagesToProcess[i];
    if (pDef.isBlank) continue;

    let pageText = "";
    if (pDef.extractedText) {
      pageText = pDef.extractedText;
    } else {
      const arrayBuffer = sourcePdfs[pDef.sourceFileId];
      if (!window['pdfjs-dist/build/pdf']) throw new Error("Motor de leitura não carregado.");

      const pdf = await pdfjsLib.getDocument({
        data: new Uint8Array(arrayBuffer),
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
        cMapPacked: true,
        standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/standard_fonts/',
        useWorkerFetch: true
      }).promise;

      const page = await pdf.getPage(pDef.originalPageNum);
      const textContent = await page.getTextContent();
      pageText = textContent.items.map(function(item) { return item.str; }).join(' ');
    }
    
    if (pageText.trim().length > 0) {
      extractedText += "\n\n--- [Página " + (i + 1) + "] ---\n" + pageText + "\n";
      encontrouTextoReal = true;
    }
  }
  
  if (!encontrouTextoReal) throw new Error("Nenhum texto legível encontrado.");
  return extractedText;
}

/* --- MOTORES DE INTELIGÊNCIA ARTIFICIAL (GEMINI API) --- */
async function executarIA(acao) {
  const apiKey = localStorage.getItem('gemini_api_key');
  
  if (!apiKey) {
    if (typeof showToast === 'function') showToast("Configure a chave do motor de IA primeiro.", "warning");
    const modalEl = document.getElementById('modalConfiguracoes');
    if (modalEl && typeof bootstrap !== 'undefined') {
       const bsModal = bootstrap.Modal.getOrCreateInstance(modalEl);
       bsModal.show();
       const tabApi = document.querySelector('[data-bs-target="#config-api"]');
       if(tabApi) tabApi.click();
    }
    return;
  }

  try {
    const rawText = await extrairTextoDasPaginasSelecionadas();
    if (typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("A processar e fundir conhecimentos na IA...");

    let prompt = "";
    
    if (acao === 'summarize') {
      const sumType = document.getElementById('ia-sum-type') ? document.getElementById('ia-sum-type').value : 'executive';
      if (sumType === 'bullet') prompt = "Faça um resumo em tópicos (bullet points) dos conceitos principais deste material de estudo.";
      else if (sumType === 'executive') prompt = "Faça um resumo executivo muito conciso e direto deste material.";
      else prompt = "Aja como um professor particular experiente. Faça uma explicação didática e detalhada desta matéria focando em preparar o aluno para uma prova. Seja claro e estruturado.";
    } 
    else if (acao === 'quiz_generator') {
      const count = document.getElementById('ia-quiz-count') ? document.getElementById('ia-quiz-count').value : 5;
      const level = document.getElementById('ia-quiz-level') ? document.getElementById('ia-quiz-level').value : 'médio';
      
      const checkedStylesElements = document.querySelectorAll('.quiz-style-check:checked');
      let selectedStyles = Array.from(checkedStylesElements).map(cb => cb.value);
      if (selectedStyles.length === 0) selectedStyles = ['mix'];

      const bankDeModelos = {
        "1": "1. Julgamento Único (Estilo Cebraspe/Cespe)\nAvaliar ( ) Certo / ( ) Errado.",
        "2": "2. Múltipla Escolha Direta (Apenas uma correta)\nAlternativas A a E.",
        "3": "3. Múltipla Escolha de Exceção\nAchar a INCORRETA (Exceto).",
        "4": "4. Análise de Afirmações\nJulgar (I, II, III) e escolher a combinação.",
        "5": "5. Sequência Lógica\nAvaliar (V) ou (F) e assinalar a sequência.",
        "8": "8. Asserção e Razão (Enade)\nAvaliar sentenças conectadas por PORQUE.",
        "9": "9. Somatória (Estilo UFPR/UFSC)\nGabarito é a soma."
      };

      let regrasModelo = selectedStyles.includes('mix') 
        ? "Varie os seguintes modelos:\n" + Object.values(bankDeModelos).join("\n") 
        : "Siga estritamente:\n" + selectedStyles.map(id => bankDeModelos[id]).join("\n");

      prompt = `Atue como um examinador de bancas. Crie ${count} questões de nível: ${level.toUpperCase()}.
ARQUITETURA(S) DA QUESTÃO:
${regrasModelo}

RETORNO OBRIGATÓRIO (CRÍTICO): Retorne ESTRITAMENTE um JSON:
{
  "titulo": "Simulado Extraído",
  "questoes": [
    {
      "enunciado": "...",
      "opcoes": ["Opção A", "Opção B", "Opção C", "Opção D", "Opção E"],
      "indice_correto": 1, 
      "explicacao": "..."
    }
  ]
}`;
    }
    else if (acao === 'mindmap') {
      const level = document.getElementById('ia-mindmap-level') ? document.getElementById('ia-mindmap-level').value : 'detalhado';
      const layout = document.getElementById('ia-mindmap-layout') ? document.getElementById('ia-mindmap-layout').value : 'TD';
      // CORREÇÃO: Pedimos explicitamente o bloco markdown
      prompt = "Crie um diagrama Mermaid baseado no documento. Nível: " + level.toUpperCase() + ".\n" +
               "REGRAS: 1. Use 'graph " + layout + "'. 2. Texto dos nós em aspas duplas (Ex: id1[\"Texto\"]). Retorne o código ESTRITAMENTE dentro de um bloco markdown ```mermaid ... ```.";
    }
    else if (acao === 'flashcards') {
      const count = document.getElementById('ia-cards-count') ? document.getElementById('ia-cards-count').value : 10;
      const level = document.getElementById('ia-cards-level') ? document.getElementById('ia-cards-level').value : 'médio';
      prompt = `Atue como um especialista em neuroaprendizagem. Crie ${count} flashcards (Cartões de Memorização) com profundidade: ${level.toUpperCase()}.
Eles devem ser baseados EXCLUSIVAMENTE no documento fornecido.
A "frente" deve ter uma pergunta direta, conceito ou lacuna.
O "verso" deve ter a resposta exata e uma micro-explicação (se necessário).
RETORNO OBRIGATÓRIO (JSON PURO, SEM MARKDOWNS): 
[ { "frente": "Pergunta?", "verso": "Resposta." } ]`;
    }

    const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=" + apiKey, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt + "\n\nMATERIAL DE ESTUDO:\n" + rawText }] }],
        generationConfig: { temperature: 0.2 }
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    const finalContent = data.candidates[0].content.parts[0].text;
    
    if (acao === 'quiz_generator') {
        const jsonString = finalContent.replace(/```json/g, '').replace(/```/g, '').trim();
        const quizData = JSON.parse(jsonString);
        if (typeof window.abrirModalQuizInterativo === 'function') window.abrirModalQuizInterativo(quizData);
        if (typeof dispararAcaoGamificacao === 'function') dispararAcaoGamificacao('gerar_quiz');
    } else if (acao === 'flashcards') {
        const jsonString = finalContent.replace(/```json/g, '').replace(/```/g, '').trim();
        const cardsData = JSON.parse(jsonString);
        
        // CORREÇÃO: Carimba o contexto imediatamente na criação do objeto!
        const baralho = { 
            titulo: 'Baralho de Memorização', 
            cartoes: cardsData,
            contexto: obterContextoEstudoAtual() 
        };
        
        if (typeof window.abrirModalFlashcardsInterativo === 'function') window.abrirModalFlashcardsInterativo(baralho);
        if (typeof dispararAcaoGamificacao === 'function') dispararAcaoGamificacao('gerar_flashcards');
    } else {
        let modalTitle = acao === 'summarize' ? 'Resumo da Matéria' : 'Mapa Mental Visual';
        let conteudoRender = finalContent;
        
        // BLINDAGEM: Se for Mapa Mental e a IA esquecer as crases do markdown, nós injetamos!
        if (acao === 'mindmap' && !conteudoRender.includes('```mermaid')) {
            conteudoRender = "```mermaid\n" + conteudoRender.replace(/```/g, '').trim() + "\n```";
        }

        if (typeof window.abrirModalResultadoIA === 'function') window.abrirModalResultadoIA(modalTitle, conteudoRender, acao, null);
        if (typeof dispararAcaoGamificacao === 'function') dispararAcaoGamificacao('gerar_' + acao);
    }

  } catch (error) {
    console.error("Erro na resposta da IA:", error);
    // 🐮 A NOSSA VAQUINHA EMPÁTICA ENTRA EM AÇÃO AQUI:
    if (typeof window.exibirErroAmigavelIA === 'function') {
        window.exibirErroAmigavelIA(error);
    } else {
        if (typeof showToast === 'function') showToast(error.message, "error");
    }
  } finally {
    if (typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
  }
}

/* ==========================================================================
   MÓDULO DE GRAVAÇÃO NA NUVEM (GENÉRICO & QUIZZES) COM CONTEXTO
   ========================================================================== */

window.resultadoIAAtual = null; 

window.salvarResultadoGenericoNoBanco = function() {
    if (!window.resultadoIAAtual || window.resultadoIAAtual.idCloud) return; 
    const email = localStorage.getItem('usuario_email');
    if (!email) { alert("Faz o login para usar o acervo cloud."); return; }

    const id = 'mat-' + Date.now();
    window.resultadoIAAtual.contexto = obterContextoEstudoAtual(); 

    if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("A enviar para a Nuvem...");

    google.script.run.withSuccessHandler(resp => {
        if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
        if(resp.success) {
            const modalResult = document.getElementById('modal-ia-resultado');
            if (modalResult) modalResult.style.display = 'none';

            if(typeof showToast === 'function') showToast("Material salvo com sucesso no seu Acervo!", "success");
            window.carregarAcervoGlobal(); 
        } else {
            alert("Erro da Nuvem: " + resp.error);
        }
    }).salvarMaterialIABanco(email, id, window.resultadoIAAtual.tipo, window.resultadoIAAtual.titulo, window.resultadoIAAtual);
};

window.salvarQuizNoBanco = function(isUpdate = false) {
    if (!window.quizDataAtual) return;
    const email = localStorage.getItem('usuario_email');
    if (!email) { alert("Faz o login para usar o acervo cloud."); return; }

    const id = window.quizDataAtual.idCloud || ('quiz-' + Date.now());
    window.quizDataAtual.idCloud = id;
    if (!isUpdate) window.quizDataAtual.contexto = obterContextoEstudoAtual(); 

    if (!isUpdate && typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("A arquivar Simulado...");

    const gravarFisicamente = function() {
        google.script.run.withSuccessHandler(resp => {
            if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
            if(resp.success) {
                if (!isUpdate) {
                    const modalQuiz = document.getElementById('modal-ia-quiz');
                    if (modalQuiz) modalQuiz.remove(); 
                    if(typeof showToast === 'function') showToast("Simulado guardado no seu banco da nuvem!", "success");
                } else {
                    if(typeof showToast === 'function') showToast("Histórico de tentativas atualizado na Nuvem!", "success");
                }
                if(typeof dispararAcaoGamificacao === 'function' && !isUpdate) dispararAcaoGamificacao('salvar_quiz_gerado');
                window.carregarAcervoGlobal();
            } else {
                alert("Erro da Nuvem: " + resp.error);
            }
        }).salvarMaterialIABanco(email, id, 'quiz_generator', window.quizDataAtual.titulo, window.quizDataAtual);
    };

    if (isUpdate) {
        google.script.run.withSuccessHandler(() => { gravarFisicamente(); }).excluirMaterialIABanco(email, id);
    } else {
        gravarFisicamente();
    }
};

window.deletarItemAcervo = function(idItem) {
    window.confirmarAcao(
        "Apagar do Acervo?", 
        "Atenção! Tem a certeza de que deseja apagar este material da nuvem permanentemente?", 
        "Sim, apagar", 
        () => {
            const email = localStorage.getItem('usuario_email');
            if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("A apagar ficheiro...");
            
            google.script.run.withSuccessHandler(resp => {
                if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
                if(resp.success) {
                    if(typeof showToast === 'function') showToast("Item apagado da Nuvem.", "info");
                    window.carregarAcervoGlobal();
                } else {
                    if (typeof showToast === 'function') showToast("Erro: " + resp.error, "error");
                }
            }).excluirMaterialIABanco(email, idItem);
        }
    );
};

/* ==========================================================================
   ACERVO UI ENGINE (GRID/LISTA, PESQUISA, PAGINAÇÃO E BATCH ACTIONS)
   ========================================================================== */

window.AcervoUI = {
    state: {}, 

    init: function(tipo, containerId, badgeLabel, iconName, acaoClickHtml) {
        if (!this.state[tipo]) {
            const savedView = localStorage.getItem('acervo_view_pref') || 'grid';
            this.state[tipo] = { view: savedView, page: 1, perPage: 6, search: '', sort: 'date_desc', selected: [] };
        }
        this.render(tipo, containerId, badgeLabel, iconName, acaoClickHtml);
    },

    render: function(tipo, containerId, badgeLabel, iconName, acaoClickHtml) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const allItems = window.acervoIA_Cache.filter(item => item.tipo === tipo);
        const st = this.state[tipo];

        let filteredItems = allItems.filter(item => {
            const termo = st.search.toLowerCase();
            return item.titulo.toLowerCase().includes(termo) || 
                   (item.dados && item.dados.contexto && item.dados.contexto.jornada.toLowerCase().includes(termo)) ||
                   (item.dados && item.dados.contexto && item.dados.contexto.materia.toLowerCase().includes(termo));
        });

        filteredItems.sort((a, b) => {
            if (st.sort === 'date_desc') return new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-'));
            if (st.sort === 'date_asc') return new Date(a.data.split('/').reverse().join('-')) - new Date(b.data.split('/').reverse().join('-'));
            if (st.sort === 'alpha_asc') return a.titulo.localeCompare(b.titulo);
            if (st.sort === 'alpha_desc') return b.titulo.localeCompare(a.titulo);
            return 0;
        });

        const totalPages = Math.ceil(filteredItems.length / st.perPage) || 1;
        if (st.page > totalPages) st.page = totalPages;
        const startIndex = (st.page - 1) * st.perPage;
        const paginatedItems = filteredItems.slice(startIndex, startIndex + st.perPage);

        let html = `
        <div class="bg-white p-3 rounded-4 shadow-sm border border-light mb-4">
            <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center">
                
                <div class="d-flex gap-2 align-items-center bg-light rounded-pill px-3 py-1 flex-grow-1" style="max-width: 400px; border: 1px solid var(--border-color);">
                    <i class="material-icons text-muted">search</i>
                    <input type="text" class="form-control border-0 bg-transparent shadow-none" placeholder="Pesquisar por título ou jornada..." value="${st.search}" oninput="AcervoUI.updateSearch('${tipo}', '${containerId}', '${badgeLabel}', '${iconName}', '${acaoClickHtml}', this.value)">
                </div>

                <div class="d-flex gap-2 align-items-center flex-wrap">
                    ${st.selected.length > 0 ? `
                        <button class="btn btn-danger btn-sm fw-bold d-flex align-items-center gap-1 rounded-pill px-3 shadow-sm pulse-btn-add" onclick="AcervoUI.batchDelete('${tipo}')">
                            <i class="material-icons" style="font-size: 16px;">delete_sweep</i> Excluir (${st.selected.length})
                        </button>
                        <div class="vr mx-1 opacity-25"></div>
                    ` : ''}
                    
                    <select class="form-select form-select-sm border shadow-sm rounded-pill px-3" style="width: 170px;" onchange="AcervoUI.updateSort('${tipo}', '${containerId}', '${badgeLabel}', '${iconName}', '${acaoClickHtml}', this.value)">
                        <option value="date_desc" ${st.sort === 'date_desc' ? 'selected' : ''}>Mais Recentes</option>
                        <option value="date_asc" ${st.sort === 'date_asc' ? 'selected' : ''}>Mais Antigos</option>
                        <option value="alpha_asc" ${st.sort === 'alpha_asc' ? 'selected' : ''}>Alfabética (A-Z)</option>
                        <option value="alpha_desc" ${st.sort === 'alpha_desc' ? 'selected' : ''}>Alfabética (Z-A)</option>
                    </select>
                    
                    <div class="btn-group shadow-sm rounded-pill border bg-white p-1">
                        <button class="btn btn-sm rounded-pill border-0 px-2 ${st.view === 'grid' ? 'btn-primary' : 'btn-light text-muted'}" onclick="AcervoUI.updateView('${tipo}', '${containerId}', '${badgeLabel}', '${iconName}', '${acaoClickHtml}', 'grid')" title="Visualização em Cards">
                            <i class="material-icons" style="font-size: 18px;">grid_view</i>
                        </button>
                        <button class="btn btn-sm rounded-pill border-0 px-2 ${st.view === 'list' ? 'btn-primary' : 'btn-light text-muted'}" onclick="AcervoUI.updateView('${tipo}', '${containerId}', '${badgeLabel}', '${iconName}', '${acaoClickHtml}', 'list')" title="Visualização em Lista">
                            <i class="material-icons" style="font-size: 18px;">view_list</i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        `;

        if (paginatedItems.length === 0) {
            html += `
            <div class="col-12 text-center py-5 text-muted border rounded-4 bg-white shadow-sm" style="border-style: dashed !important;">
              <i class="material-icons mb-3" style="font-size: 48px; opacity: 0.3;">folder_open</i>
              <h5 class="fw-bold">Nenhum item encontrado.</h5>
              <p class="mb-0 small">Ajuste os filtros ou crie novos materiais na Estação.</p>
            </div>`;
            container.innerHTML = html;
            return;
        }

        if (st.view === 'grid') {
            html += `<div class="row g-4 mb-4">`;
            paginatedItems.forEach(item => {
                const ctx = item.dados.contexto || { jornada: 'Estudo Livre', materia: '-' };
                const isSelected = st.selected.includes(item.id);
                html += `
                <div class="col-md-6 col-lg-4">
                    <div class="card border-0 shadow-sm rounded-4 p-4 h-100 bg-white transition-hover d-flex flex-column position-relative ${isSelected ? 'border-primary' : ''}" style="${isSelected ? 'box-shadow: 0 0 0 2px var(--primary) !important;' : ''}">
                        
                        <div class="position-absolute top-0 start-0 m-3 z-2">
                            <input class="form-check-input shadow-sm" type="checkbox" style="width: 20px; height: 20px; cursor: pointer;" ${isSelected ? 'checked' : ''} onchange="AcervoUI.toggleSelect('${tipo}', '${containerId}', '${badgeLabel}', '${iconName}', '${acaoClickHtml}', '${item.id}')">
                        </div>

                        <div class="d-flex justify-content-end align-items-start mb-3 ms-4">
                            <span class="badge bg-primary-subtle text-primary rounded-pill fw-bold d-flex align-items-center gap-1"><i class="material-icons" style="font-size: 14px;">${iconName}</i> ${badgeLabel}</span>
                        </div>
                        
                        <h5 class="fw-bold text-dark mb-2" style="line-height: 1.3;">${escapeHtml(item.titulo)}</h5>
                        
                        <div class="mt-2 mb-3 px-3 py-2 bg-light rounded-3 border" style="cursor: help;" title="Jornada e Matéria">
                            <div class="small fw-bold text-secondary text-truncate"><i class="material-icons align-middle" style="font-size: 14px;">map</i> ${escapeHtml(ctx.jornada)}</div>
                            <div class="small text-muted text-truncate"><i class="material-icons align-middle" style="font-size: 14px;">menu_book</i> ${escapeHtml(ctx.materia)}</div>
                        </div>

                        <div class="d-flex flex-wrap justify-content-between mb-4 text-muted small mt-auto">
                            <span title="Data de Criação"><i class="material-icons align-middle text-secondary" style="font-size: 16px;">event</i> ${item.data}</span>
                            <div>
                                <button class="btn btn-sm btn-link text-primary p-0 text-decoration-none fw-bold me-2" onclick="window.abrirModalEdicaoAcervo('${item.id}')">Editar</button>
                                <button class="btn btn-sm btn-link text-danger p-0 text-decoration-none fw-bold" onclick="window.deletarItemAcervo('${item.id}')">Excluir</button>
                            </div>
                        </div>
                        
                        <button class="btn btn-outline-primary w-100 rounded-pill fw-bold shadow-sm" onclick="${acaoClickHtml}('${item.id}')">
                            <i class="material-icons align-middle fs-6 me-1">visibility</i> Visualizar Item
                        </button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        } else {
            html += `
            <div class="bg-white rounded-4 shadow-sm border overflow-hidden mb-4">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="bg-light text-muted small text-uppercase">
                            <tr>
                                <th style="width: 50px;" class="text-center">
                                    <input class="form-check-input" type="checkbox" onchange="AcervoUI.toggleSelectAll('${tipo}', '${containerId}', '${badgeLabel}', '${iconName}', '${acaoClickHtml}', this.checked)">
                                </th>
                                <th>Título</th>
                                <th>Jornada / Matéria</th>
                                <th>Data</th>
                                <th class="text-end pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            paginatedItems.forEach(item => {
                const ctx = item.dados.contexto || { jornada: 'Estudo Livre', materia: '-' };
                const isSelected = st.selected.includes(item.id);
                html += `
                            <tr class="${isSelected ? 'bg-primary-subtle' : ''}">
                                <td class="text-center">

                    html += `<li class="page-item ${st.page === p ? 'active' : ''}">

                    html += `<li class="page-item disabled"><span class="page-link border-0">...</span></li>`;
                }
            }

            html += `   <li class="page-item ${st.page === totalPages ? 'disabled' : ''}">

        }

        container.innerHTML = html;
    },

    updateSearch: function(t, c, b, i, a, val) { this.state[t].search = val; this.state[t].page = 1; this.render(t, c, b, i, a); },
    updateSort: function(t, c, b, i, a, val) { this.state[t].sort = val; this.render(t, c, b, i, a); },
    updateView: function(t, c, b, i, a, val) { 
        this.state[t].view = val; 
        localStorage.setItem('acervo_view_pref', val);
        this.render(t, c, b, i, a); 
    },
    setPage: function(t, c, b, i, a, val) { this.state[t].page = val; this.render(t, c, b, i, a); },
    
    toggleSelect: function(t, c, b, i, a, id) {
        const idx = this.state[t].selected.indexOf(id);
        if (idx > -1) this.state[t].selected.splice(idx, 1);
        else this.state[t].selected.push(id);
        this.render(t, c, b, i, a);
    },

    toggleSelectAll: function(t, c, b, i, a, isChecked) {
        if (!isChecked) {
            this.state[t].selected = [];
        } else {
            const termo = this.state[t].search.toLowerCase();
            const filtered = window.acervoIA_Cache.filter(item => item.tipo === t && (
                item.titulo.toLowerCase().includes(termo) || 
                (item.dados && item.dados.contexto && item.dados.contexto.jornada.toLowerCase().includes(termo))
            ));
            this.state[t].selected = filtered.map(x => x.id);
        }
        this.render(t, c, b, i, a);
    },

    batchDelete: function(tipo) {
        const idsToDelete = this.state[tipo].selected;
        if(idsToDelete.length === 0) return;
        
        window.confirmarAcao(
            "Exclusão em Massa", 
            `Tem certeza de que deseja excluir permanentemente os ${idsToDelete.length} itens selecionados?`, 
            "Excluir Todos", 
            () => {
                const email = localStorage.getItem('usuario_email');
                if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("A excluir itens em massa...");

                let processados = 0;
                idsToDelete.forEach(id => {
                    google.script.run.withSuccessHandler(() => {
                        processados++;
                        if (processados === idsToDelete.length) {
                            if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
                            if(typeof showToast === 'function') showToast(`${processados} itens excluídos com sucesso!`, "success");
                            this.state[tipo].selected = []; 
                            window.carregarAcervoGlobal(); 
                        }
                    }).excluirMaterialIABanco(email, id);
                });
            }
        );
    } // FECHA A FUNÇÃO batchDelete
}; // FECHA O OBJETO window.AcervoUI

window.abrirModalResultadoIA = function(titulo, textoMarkdown, tipoOrigem = 'resumo', idCloud = null) {
  window.resultadoIAAtual = { titulo: titulo, conteudo: textoMarkdown, tipo: tipoOrigem, idCloud: idCloud };

  let modal = document.getElementById('modal-ia-resultado');
  
  const formatarMarkdown = (md) => {
    let mermaidBlocks = [];
    let hasMermaid = false;
    const userTheme = document.getElementById('ia-mindmap-theme') ? document.getElementById('ia-mindmap-theme').value : 'default';
    
    let tempMd = md.replace(/```mermaid([\s\S]*?)```/g, (match, code) => {
       hasMermaid = true;
       let cleanCode = `%%{init: {'theme': '${userTheme}'}}%%\n` + code.trim().replace(/&/g, 'e');
       mermaidBlocks.push(cleanCode);
       return `__COFRE_MERMAID_${mermaidBlocks.length - 1}__`;
    });

    let html = tempMd
      .replace(/^### (.*$)/gim, '<h4 class="fw-bold mt-3">$1</h4>')
      .replace(/^## (.*$)/gim, '<h3 class="fw-bold mt-4">$1</h3>')
      .replace(/^# (.*$)/gim, '<h2 class="fw-bold mt-4">$1</h2>')
      .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
      .replace(/^\* (.*$)/gim, '<li>$1</li>');
    
    html = html.replace(/<\/li>\n<li>/gim, '</li><li>').replace(/\n/gim, '<br>');

    if (hasMermaid) {
       mermaidBlocks.forEach((code, index) => {
          // CORREÇÃO: Altura responsiva (60vh) e user-select: none para evitar selecionar texto
          const container = `
            <div class="mermaid-wrapper w-100 mt-3 mb-4 shadow-sm p-2 d-flex flex-column" style="background: var(--bg-input); border-color: var(--border-color);">
                <div class="d-flex justify-content-end mb-2 gap-2 flex-shrink-0">
                    <button class="btn btn-sm border" style="background: var(--bg-card); color: var(--text-main);" onclick="window.zoomMermaid(-0.2)" title="Diminuir"><i class="material-icons">zoom_out</i></button>
                    <button class="btn btn-sm border" style="background: var(--bg-card); color: var(--text-main);" onclick="window.zoomMermaid(0.2)" title="Aumentar"><i class="material-icons">zoom_in</i></button>
                    <button class="btn btn-sm btn-primary d-flex align-items-center gap-1 fw-bold" onclick="window.baixarMapaMentalPng()"><i class="material-icons fs-6">download</i> Salvar PNG</button>
                </div>
                <div id="mermaid-pan-zoom" style="overflow: hidden; width: 100%; height: 60vh; min-height: 400px; display: flex; align-items: center; justify-content: center; cursor: grab; position: relative; user-select: none; -webkit-user-select: none;">
                    <div class="mermaid" style="position: absolute; transform-origin: center; transition: transform 0.1s ease-out;">${code}</div>
                </div>
            </div>`;
          html = html.replace(`__COFRE_MERMAID_${index}__`, container);
       });
    }
    return { html: html, hasMermaid: hasMermaid };
  };

  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modal-ia-resultado';
    modal.style.cssText = 'position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(15,23,42,0.8); z-index:10600; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px); padding:20px;';
    document.body.appendChild(modal);
  }

  const formatedData = formatarMarkdown(textoMarkdown);

  const isSaved = !!idCloud;
  const btnSalvarHtml = isSaved ? '' : `
         <button class="btn btn-warning btn-sm fw-bold shadow-sm d-flex align-items-center gap-1 text-dark rounded-pill px-3" onclick="window.salvarResultadoGenericoNoBanco()">
            <i class="material-icons fs-6">save</i> Salvar
         </button>`;

  modal.innerHTML = `
  <div style="background: var(--bg-card); color: var(--text-main); width:100%; max-width:900px; height:85vh; border-radius:var(--radius-lg); display:flex; flex-direction:column; overflow:hidden; box-shadow:var(--shadow-lg); border: 1px solid var(--border-color);">
    <div class="d-flex justify-content-between align-items-center p-3 border-bottom" style="background: var(--bg-input);">
      <h4 class="fw-bold m-0 d-flex align-items-center text-primary"><i class="material-icons me-2">auto_awesome</i> ${titulo}</h4>
      <div class="d-flex gap-2">
         ${btnSalvarHtml}
         <button class="btn btn-light rounded-circle p-1 d-flex align-items-center justify-content-center border-0" style="background: transparent; color: var(--text-main);" onclick="document.getElementById('modal-ia-resultado').style.display='none';">
            <i class="material-icons">close</i>
         </button>
      </div>
    </div>
    <div style="flex:1; overflow-y:auto; padding:30px; font-size:15px; line-height:1.6; display: flex; flex-direction: column;">
      ${formatedData.html}
    </div>
  </div>`;
  
  modal.style.display = 'flex';

  if (formatedData.hasMermaid && typeof mermaid !== 'undefined') {
     setTimeout(() => {
         try {
             mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
             mermaid.init(undefined, document.querySelectorAll('.mermaid'));
             // Zera as variáveis de movimento sempre que abre um mapa novo
             window.currentMermaidScale = 1;
             window.currentTranslateX = 0;
             window.currentTranslateY = 0;
             if(typeof iniciarPanZoomMermaid === 'function') iniciarPanZoomMermaid();
         } catch (e) { console.error("Erro no Mermaid:", e); }
     }, 100);
  }
};

/* ==========================================================================
   MOTOR DE NAVEGAÇÃO E DOWNLOAD DO MAPA MENTAL (PAN & ZOOM)
   ========================================================================== */

window.currentMermaidScale = 1;
window.currentTranslateX = 0;
window.currentTranslateY = 0;

window.atualizarTransformacaoMermaid = function() {
    const mermaidDiv = document.querySelector('.mermaid');
    if(mermaidDiv) {
        mermaidDiv.style.transform = `translate(${window.currentTranslateX}px, ${window.currentTranslateY}px) scale(${window.currentMermaidScale})`;
    }
};

window.zoomMermaid = function(step) {
    window.currentMermaidScale += step;
    if (window.currentMermaidScale < 0.3) window.currentMermaidScale = 0.3;
    if (window.currentMermaidScale > 5.0) window.currentMermaidScale = 5.0; 
    window.atualizarTransformacaoMermaid();
};

window.mermaidHandlersAtivos = false;

window.iniciarPanZoomMermaid = function() {
    const container = document.getElementById('mermaid-pan-zoom');
    if (!container) return;

    let isDragging = false;
    let startX, startY;

    container.addEventListener('mousedown', (e) => {
        isDragging = true;
        container.style.cursor = 'grabbing';
        // Desconta o quanto já nos movemos para que o clique não dê "saltos"
        startX = e.clientX - window.currentTranslateX;
        startY = e.clientY - window.currentTranslateY;
    });

    // Registra os ouvintes no document apenas uma vez para o arrasto funcionar suave fora do quadro
    if (!window.mermaidHandlersAtivos) {
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            window.currentTranslateX = e.clientX - startX;
            window.currentTranslateY = e.clientY - startY;
            window.atualizarTransformacaoMermaid();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            const cnt = document.getElementById('mermaid-pan-zoom');
            if(cnt) cnt.style.cursor = 'grab';
        });
        window.mermaidHandlersAtivos = true;
    }
};

window.baixarMapaMentalPng = function() {
    const svgElement = document.querySelector('.mermaid svg');
    if (!svgElement) {
        alert("Ouve um erro ao localizar o gráfico. Tente gerar novamente.");
        return;
    }

    if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("A renderizar PNG de alta qualidade...");

    // Cria um clone do SVG para manipular sem estragar a tela
    const clone = svgElement.cloneNode(true);
    const bbox = svgElement.getBoundingClientRect();
    
    // Força dimensões absolutas
    clone.setAttribute('width', bbox.width);
    clone.setAttribute('height', bbox.height);
    
    // Injeta um fundo branco no clone
    const style = document.createElement('style');
    style.innerHTML = 'svg { background-color: #ffffff; }';
    clone.insertBefore(style, clone.firstChild);

    // Serializa o SVG
    const svgData = new XMLSerializer().serializeToString(clone);
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // Dobra a resolução para o texto não ficar borrado no PNG (Retina Display)
    canvas.width = bbox.width * 2;
    canvas.height = bbox.height * 2;

    img.onload = function() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        const link = document.createElement('a');
        link.download = window.resultadoIAAtual ? (window.resultadoIAAtual.titulo + '.png') : 'mapa_mental.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
    };
    
    // Transforma o texto XML em base64 segura para o elemento Image processar
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
};

window.resolverQuestao = function(qIndex, clicadaIndex, corretaIndex) {
    const card = document.getElementById(`q-card-${qIndex}`);
    if (card.classList.contains('respondida')) return; 
    card.classList.add('respondida');

    clicadaIndex = Number(clicadaIndex);
    corretaIndex = Number(corretaIndex);
    const acertou = (clicadaIndex === corretaIndex);

    document.getElementById(`feedback-${qIndex}`).style.display = 'block';

    window.quizDataAtual.respostasTemporarias.respondidas++;
    if (acertou) window.quizDataAtual.respostasTemporarias.acertos++;

    const opcoes = card.querySelectorAll('.quiz-option');
    opcoes.forEach((op, index) => {
        const circulo = op.querySelector('.opt-circle');
        if (index === corretaIndex) {
            op.classList.remove('bg-light');
            op.classList.add('show-correct');
            circulo.innerHTML = '<i class="material-icons" style="font-size:16px; color:#15803d;">check</i>';
            circulo.style.borderColor = '#22c55e';
            circulo.style.background = '#dcfce3';
        } else if (index === clicadaIndex && !acertou) {
            op.classList.remove('bg-light');
            op.classList.add('selected-wrong');
            circulo.innerHTML = '<i class="material-icons" style="font-size:16px; color:#b91c1c;">close</i>';
            circulo.style.borderColor = '#ef4444';
            circulo.style.background = '#fee2e2';
        }
    });

    if(typeof dispararAcaoGamificacao === 'function') {
        if(acertou) dispararAcaoGamificacao('acertar_questao_quiz');
        else dispararAcaoGamificacao('errar_questao_quiz');
    }

    if (window.quizDataAtual.respostasTemporarias.respondidas === window.quizDataAtual.questoes.length) {
        window.finalizarTentativaQuiz();
    }
};

window.finalizarTentativaQuiz = function() {
    const temp = window.quizDataAtual.respostasTemporarias;
    if (!window.quizDataAtual.historico) window.quizDataAtual.historico = [];

    const percentual = Math.round((temp.acertos / temp.respondidas) * 100);
    const tentativa = {
        data: new Date().toLocaleString('pt-BR'),
        acertos: temp.acertos,
        total: temp.respondidas,
        percentual: percentual
    };

    window.quizDataAtual.historico.push(tentativa);

    const msg = `Simulado Concluído! Acertaste ${tentativa.acertos} de ${tentativa.total} (${tentativa.percentual}%).`;
    if (typeof showToast === 'function') showToast(msg, "info");

    if (window.quizDataAtual.idCloud) {
        window.salvarQuizNoBanco(true); 
    } else {
        const btnSalvar = document.getElementById('btn-salvar-quiz-modal');
        if (btnSalvar) {
            btnSalvar.classList.replace('btn-warning', 'btn-danger');
            btnSalvar.classList.add('pulse-btn-add');
            btnSalvar.innerHTML = '<i class="material-icons fs-5">cloud_upload</i> Guardar Histórico';
        }
    }
};

window.exportarProvaParaVisualizar = function(tipo) {

window.imprimirPreviewDireto = function() {
    const conteudo = document.getElementById('preview-content-box').innerHTML;

    newWindow.document.write(`<html><head><title>Impressão</title><style>body { margin: 0; padding: 0; } @media print { body { padding: 20px; } }</style></head><body onload="window.print(); window.close();">${conteudo}</body></html>`);

window.baixarPreviewComoPDF = function(titulo, subtitulo) {
    if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("A gerar arquivo PDF...");
    
    if (typeof html2pdf === 'undefined') {
        const script = document.createElement('script');
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js";
        script.onload = () => executarHtml2Pdf(titulo, subtitulo);
        document.body.appendChild(script);
    } else {
        executarHtml2Pdf(titulo, subtitulo);
    }
};

function executarHtml2Pdf(titulo, subtitulo) {
    const element = document.getElementById('print-content-wrapper');
    const opt = {
        margin:       15,
        filename:     `${titulo} - ${subtitulo}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
        if(typeof showToast === 'function') showToast("Download do PDF concluído com sucesso!", "success");
    }).catch(err => {
        if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
        alert("Erro ao gerar PDF: " + err);
    });
}

window.copyQuizToClipboard = function() {
  if (!window.quizDataAtual) {
    if(typeof showToast === 'function') showToast("Nenhum quiz gerado para copiar.", "warning");
    return;
  }
  let htmlTemplate = `
<div class="quiz-embed-container" style="font-family: sans-serif; max-width: 600px; margin: auto;">
  <h2 style="color: #1e293b;">${escapeHtml(window.quizDataAtual.titulo)}</h2>
  ${window.quizDataAtual.questoes.map((q, i) => `
    <div class="quiz-question" style="margin-bottom: 20px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px;">
      <p style="font-weight: bold;">${i + 1}. ${escapeHtml(q.enunciado)}</p>
      <ul style="list-style: none; padding: 0;">
        ${q.opcoes.map(op => `<li style="padding: 5px 0;">[ ] ${escapeHtml(op)}</li>`).join('')}
      </ul>
    </div>
  `).join('')}
</div>`;

  navigator.clipboard.writeText(htmlTemplate).then(() => {
    if(typeof showToast === 'function') showToast("HTML do quiz copiado com sucesso!", "success");
  }).catch(err => {
    if(typeof showToast === 'function') showToast("Erro ao copiar o código.", "error");
    console.error(err);
  });
};

if (typeof escapeHtml !== 'function') {
    window.escapeHtml = function(unsafe) {
        return (unsafe || "").toString()
             .replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
    };
}

window.mudarJornadaEdicaoAcervo = function(matParaSelecionar = null, topParaSelecionar = null) {
    const selJor = document.getElementById('edit-acervo-jornada-select');
    const inpJor = document.getElementById('edit-acervo-jornada-input');
    const selMat = document.getElementById('edit-acervo-materia-select');
    const inpMat = document.getElementById('edit-acervo-materia-input');

    if (!selJor || !selMat) return;

    const valJor = selJor.value;

    if (valJor === 'OUTRA') {
        inpJor.style.display = 'block';
        if(!inpJor.value && !matParaSelecionar) inpJor.focus();
    } else {
        inpJor.style.display = 'none';
    }

    selMat.innerHTML = `
        <option value="Matéria Não Especificada">Matéria Não Especificada</option>
        <option value="OUTRA" class="text-secondary">➕ Digitar outra matéria livremente...</option>
    `;

    let matEncontrada = false;

    if (valJor !== 'OUTRA' && valJor !== 'Estudo Independente') {
        const journey = (typeof minhasJornadas !== 'undefined') ? minhasJornadas.find(j => j.titulo === valJor) : null;
        if (journey && journey.materias) {
            journey.materias.forEach(m => {
                const matNome = m.name || m.nome;
                const opt = document.createElement('option');
                opt.value = matNome;
                
                // CORTADOR DE CARACTERES
                opt.text = matNome.length > 50 ? matNome.substring(0, 50) + '...' : matNome;
                opt.title = matNome;
                
                selMat.insertBefore(opt, selMat.options[selMat.options.length - 1]);
                if (matParaSelecionar && matNome === matParaSelecionar) matEncontrada = true;
            });
        }
    }

    if (matParaSelecionar) {
        if (matEncontrada || matParaSelecionar === 'Matéria Não Especificada') {
            selMat.value = matParaSelecionar;
        } else {
            selMat.value = 'OUTRA';
            inpMat.value = matParaSelecionar;
            inpMat.style.display = 'block';
        }
    } else {
        selMat.value = 'Matéria Não Especificada';
        inpMat.style.display = 'none';
    }

    window.mudarMateriaEdicaoAcervo(topParaSelecionar);
};

window.mudarMateriaEdicaoAcervo = function(topParaSelecionar = null) {
    const selJor = document.getElementById('edit-acervo-jornada-select');
    const selMat = document.getElementById('edit-acervo-materia-select');
    const inpMat = document.getElementById('edit-acervo-materia-input');
    const selTop = document.getElementById('edit-acervo-topico-select');
    const inpTop = document.getElementById('edit-acervo-topico-input');

    if (!selMat || !selTop) return;

    const valJor = selJor.value;
    const valMat = selMat.value;

    if (valMat === 'OUTRA') {
        inpMat.style.display = 'block';
        if(!inpMat.value && !topParaSelecionar) inpMat.focus();
    } else {
        inpMat.style.display = 'none';
    }

    selTop.innerHTML = `
        <option value="Tópico Não Especificado">Tópico Não Especificado</option>
        <option value="OUTRO" class="text-secondary">➕ Digitar outro tópico livremente...</option>
    `;

    let topEncontrado = false;

    // Filtra os tópicos da matéria selecionada dentro daquela jornada específica
    if (valJor !== 'OUTRA' && valJor !== 'Estudo Independente' && valMat !== 'OUTRA' && valMat !== 'Matéria Não Especificada') {
        const journey = (typeof minhasJornadas !== 'undefined') ? minhasJornadas.find(j => j.titulo === valJor) : null;
        if (journey && journey.materias) {
            const subject = journey.materias.find(m => (m.name || m.nome) === valMat);
            if (subject && subject.topicos) {
                subject.topicos.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    
                    // CORTADOR DE CARACTERES
                    opt.text = t.length > 50 ? t.substring(0, 50) + '...' : t;
                    opt.title = t;

                    selTop.insertBefore(opt, selTop.options[selTop.options.length - 1]);
                    if (topParaSelecionar && t === topParaSelecionar) topEncontrado = true;
                });
            }
        }
    }

    if (topParaSelecionar) {
        if (topEncontrado || topParaSelecionar === 'Tópico Não Especificado') {
            selTop.value = topParaSelecionar;
        } else {
            selTop.value = 'OUTRO';
            inpTop.value = topParaSelecionar;
            inpTop.style.display = 'block';
        }
    } else {
        selTop.value = 'Tópico Não Especificado';
        inpTop.style.display = 'none';
    }
};

window.mudarTopicoEdicaoAcervo = function() {
    const selTop = document.getElementById('edit-acervo-topico-select');
    const inpTop = document.getElementById('edit-acervo-topico-input');
    
    if (selTop.value === 'OUTRO') {
        inpTop.style.display = 'block';
        if(!inpTop.value) inpTop.focus();
    } else {
        inpTop.style.display = 'none';
    }
};

window.salvarEdicaoAcervo = function(idItem) {
    const titulo = document.getElementById('edit-acervo-titulo').value.trim();
    
    const selJor = document.getElementById('edit-acervo-jornada-select');
    const inpJor = document.getElementById('edit-acervo-jornada-input');
    let jornada = selJor.value;
    if (jornada === 'OUTRA') jornada = inpJor.value.trim() || 'Estudo Independente';

    const selMat = document.getElementById('edit-acervo-materia-select');
    const inpMat = document.getElementById('edit-acervo-materia-input');
    let materia = selMat.value;
    if (materia === 'OUTRA') materia = inpMat.value.trim() || 'Matéria Não Especificada';

    const selTop = document.getElementById('edit-acervo-topico-select');
    const inpTop = document.getElementById('edit-acervo-topico-input');
    let topico = selTop.value;
    if (topico === 'OUTRO') topico = inpTop.value.trim() || 'Tópico Não Especificado';
    
    if (!titulo) {
        if(typeof showToast === 'function') showToast("O título não pode ficar vazio.", "warning");
        return;
    }

    const email = localStorage.getItem('usuario_email');
    if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("Atualizando metadados na nuvem...");
    
    const modalEl = document.getElementById('modal-editar-acervo');
    if (modalEl) bootstrap.Modal.getInstance(modalEl).hide();

    google.script.run.withSuccessHandler(resp => {
        if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
        if(resp.success) {
            if(typeof showToast === 'function') showToast("Material atualizado com sucesso!", "success");
            if(typeof dispararAcaoGamificacao === 'function') dispararAcaoGamificacao('organizar_acervo');
            window.carregarAcervoGlobal();
        } else {
            alert("Erro ao atualizar: " + resp.error);
        }
    }).atualizarMetadadosAcervoIA(email, idItem, titulo, jornada, materia, topico);
};

window.aplicarEstiloFC = function(tipo, valor) {
    const container = document.getElementById('fc-container-mestre');
    if (!container || !window.deckDataAtual) return;
    
    if (tipo === 'tema') {
        container.classList.remove('tema-classic', 'tema-night', 'tema-neon', 'tema-pastel');
        container.classList.add(valor);
        window.deckDataAtual.estilos.tema = valor;
    } else if (tipo === 'fonte') {
        container.classList.remove('font-sans', 'font-serif', 'font-hand', 'font-dyslexic');
        container.classList.add(valor);
        window.deckDataAtual.estilos.fonte = valor;
    }

    // Aciona a sincronização em background segura
    window.dispararSalvamentoFantasmaBaralho();
};

window.fcSizeTimeout = null;
window.ajustarTamanhoFC = function(step) {
    if (!window.deckDataAtual) return;

    window.fcTamanhoAtual += step;
    if (window.fcTamanhoAtual < 0.8) window.fcTamanhoAtual = 0.8; 
    if (window.fcTamanhoAtual > 2.5) window.fcTamanhoAtual = 2.5; 
    
    document.getElementById('fc-frente').style.fontSize = window.fcTamanhoAtual + 'rem';
    document.getElementById('fc-verso').style.fontSize = window.fcTamanhoAtual + 'rem';
    
    window.deckDataAtual.estilos.tamanho = window.fcTamanhoAtual;

    // Aciona a sincronização em background segura
    window.dispararSalvamentoFantasmaBaralho();
};

window.renderizarFlashcardAtual = function() {
    const cardEl = document.getElementById('fc-card-element');
    if(cardEl) cardEl.classList.remove('is-flipped'); 

    setTimeout(() => {
        const c = window.deckDataAtual.cartoes[window.flashcardIndexAtual];
        const pFrente = document.getElementById('fc-frente');
        const pVerso = document.getElementById('fc-verso');
        
        pFrente.innerText = c.frente;
        pVerso.innerText = c.verso;
        
        // Mantém a consistência visual da escala de fonte salva
        pFrente.style.fontSize = window.fcTamanhoAtual + 'rem';
        pVerso.style.fontSize = window.fcTamanhoAtual + 'rem';

        document.getElementById('fc-contador').innerText = window.flashcardIndexAtual + 1;
        document.getElementById('fc-total').innerText = window.deckDataAtual.cartoes.length;
    }, 200); 
};

window.navegarFlashcard = function(direcao) {
    const total = window.deckDataAtual.cartoes.length;
    window.flashcardIndexAtual += direcao;
    
    if (window.flashcardIndexAtual < 0) window.flashcardIndexAtual = total - 1;
    if (window.flashcardIndexAtual >= total) window.flashcardIndexAtual = 0;
    
    window.renderizarFlashcardAtual();
};

window.salvarFlashcardsNoBanco = function() {
    if (!window.deckDataAtual) return;
    const email = localStorage.getItem('usuario_email');
    if (!email) { alert("Faça login para salvar."); return; }

    // Detecta se já existe uma ID na nuvem para saber se é uma atualização ou inserção nova
    const isUpdate = !!window.deckDataAtual.idCloud;
    const id = window.deckDataAtual.idCloud || ('flash-' + Date.now());
    window.deckDataAtual.idCloud = id;
    
    if (!isUpdate && !window.deckDataAtual.contexto) {
        window.deckDataAtual.contexto = obterContextoEstudoAtual();
    }

    if (typeof mostrarLoaderGlobal === 'function') {
        mostrarLoaderGlobal(isUpdate ? "A atualizar o seu Baralho..." : "A arquivar o seu Baralho...");
    }

    const executarGravacaoFisica = function() {
        google.script.run.withSuccessHandler(resp => {
            if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
            if(resp.success) {
                const btnSave = document.getElementById('btn-salvar-flashcards');
                if(btnSave && !isUpdate) btnSave.remove();
                
                if(typeof showToast === 'function') {
                    showToast(isUpdate ? "Baralho atualizado com sucesso!" : "Baralho salvo no seu Acervo com o Contexto atual!", "success");
                }
                window.carregarAcervoGlobal();
            } else {
                alert("Erro da Nuvem: " + resp.error);
            }
        }).salvarMaterialIABanco(email, id, 'flashcards', window.deckDataAtual.titulo, window.deckDataAtual);
    };

    // Se for uma atualização, limpa o registro antigo antes de injetar o novo estado
    if (isUpdate) {
        google.script.run.withSuccessHandler(() => {
            executarGravacaoFisica();
        }).excluirMaterialIABanco(email, id);
    } else {
        executarGravacaoFisica();
    }
};

window.fcSaveTimeout = null;
window.dispararSalvamentoFantasmaBaralho = function() {
    const email = localStorage.getItem('usuario_email');
    if (!email || !window.deckDataAtual || !window.deckDataAtual.idCloud) return;

    // DEBOUNCE ANTI-TRAVAMENTO: Cancela qualquer requisição de salvamento anterior que ainda esteja na fila
    clearTimeout(window.fcSaveTimeout);
    
    // Agenda o salvamento definitivo para 1 segundo após o último clique do usuário
    window.fcSaveTimeout = setTimeout(() => {
        console.log("🔄 Sincronizando personalização no mesmo registro (ID: " + window.deckDataAtual.idCloud + ")...");
        
        // 1. Elimina a linha antiga da planilha correspondente a este ID
        google.script.run.withSuccessHandler(() => {
            // 2. Grava os novos estilos mantendo RIGOROSAMENTE o mesmo ID original
            google.script.run.withSuccessHandler(resp => {
                if(resp.success) {
                    console.log("✅ Registro atualizado em background sem duplicações.");
                    
                    // 3. Atualiza o cache do acervo na memória local silenciosamente
                    google.script.run.withSuccessHandler(respGlobal => {
                        if(respGlobal.success) window.acervoIA_Cache = respGlobal.itens;
                    }).carregarAcervoIABanco(email);
                }
            }).salvarMaterialIABanco(email, window.deckDataAtual.idCloud, 'flashcards', window.deckDataAtual.titulo, window.deckDataAtual);
        }).excluirMaterialIABanco(email, window.deckDataAtual.idCloud);
        
    }, 1000);
};
