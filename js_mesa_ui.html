<script>
/* ==========================================================================
   ESTAÇÃO DE ESTUDOS IA - MOTOR DA MESA E INTERFACE VISUAL (js_mesa_ui.html)
   ========================================================================== */

/* --------------------------------------------------------------------------
   1. UTILITÁRIOS GLOBAIS (Toasts, Loaders e Helpers)
   -------------------------------------------------------------------------- */

function showToast(msg, type) {
  let libHub = document.getElementById("pdf-lib-toast-hub");
  if (!libHub) {
    libHub = document.createElement("div");
    libHub.id = "pdf-lib-toast-hub";
    libHub.style.cssText = "position:fixed; bottom:30px; right:30px; z-index:10500; display:flex; flex-direction:column; gap:10px;";
    document.body.appendChild(libHub);
  }

  const toast = document.createElement("div");
  // Utilização de CSS Variables para manter a coerência de cores do tema
  let bg = "var(--primary)", icon = "ℹ️", color = "#fff";
  if (type === "success") { bg = "var(--success)"; icon = "✅"; }
  if (type === "error") { bg = "var(--danger)"; icon = "❌"; }
  if (type === "warning") { bg = "var(--warning)"; icon = "⚠️"; color = "#0f172a"; }

  toast.style.cssText = `background:${bg}; color:${color}; padding:12px 20px; border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; opacity:0; transform:translateY(20px); transition:all 0.3s ease; font-weight: 500; font-size: 0.9rem;`;
  toast.innerHTML = `<span>${icon}</span> <span>${msg}</span>`;
  libHub.appendChild(toast);

  requestAnimationFrame(() => { toast.style.opacity = "1"; toast.style.transform = "translateY(0)"; });
  setTimeout(() => {
    toast.style.opacity = "0"; toast.style.transform = "translateY(20px)";
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function mostrarLoaderGlobal(mensagem) {
  let loader = document.getElementById('pdf-global-loader');
  if (!loader) {
    loader = document.createElement('div');
    loader.id = 'pdf-global-loader';
    // Overlay escuro com blur para garantir contraste
    loader.style.cssText = 'position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(15,23,42,0.9); backdrop-filter:blur(4px); z-index:20000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; transition: opacity 0.3s;';
    loader.innerHTML = `
      <div style="width: 60px; height: 60px; border: 5px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: pdf-loader-spin 1s linear infinite;"></div>
      <h4 id="pdf-global-loader-msg" class="mt-4 fw-bold text-white">Processando...</h4>
      <style>@keyframes pdf-loader-spin { to { transform: rotate(360deg); } }</style>
    `;
    document.body.appendChild(loader);
  }
  document.getElementById('pdf-global-loader-msg').innerText = mensagem || 'A processar...';
  loader.style.display = 'flex';
  loader.style.opacity = '1';
}

function ocultarLoaderGlobal() {
  const loader = document.getElementById('pdf-global-loader');
  if (loader) {
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 300);
  }
}

function escapeHtml(unsafe) {
    return (unsafe || "").toString()
         .replace(/&/g, "&amp;")
         .replace(/</g, "&lt;")
         .replace(/>/g, "&gt;")
         .replace(/"/g, "&quot;")
         .replace(/'/g, "&#039;");
}

function generateId() { 
  return Math.random().toString(36).substr(2, 9); 
}


/* --------------------------------------------------------------------------
   2. CARREGAMENTO DE MATERIAIS DE ESTUDO (PDF / Word / Imagens)
   -------------------------------------------------------------------------- */

function habilitarDropZonePdf() {
  const dropZone = document.getElementById('pdf-preview-area');
  if (!dropZone) return;

  dropZone.addEventListener('dragover', function(e) { 
    e.preventDefault(); 
    dropZone.style.border = "2px dashed var(--primary)"; 
    dropZone.style.backgroundColor = "var(--bg-active)";
  });
  
  dropZone.addEventListener('dragleave', function(e) { 
    e.preventDefault(); 
    dropZone.style.border = ""; 
    dropZone.style.backgroundColor = "";
  });
  
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.style.border = ""; 
    dropZone.style.backgroundColor = "";
    if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
      loadPdfs(e.dataTransfer.files);
    }
  });
}

async function loadPdfs(files, insertIndex = null) {
  if (!files || files.length === 0) return;

  const uniqueFiles = Array.from(files).filter((file, index, self) =>
    index === self.findIndex((f) => f.name === file.name && f.size === file.size)
  );
  if (uniqueFiles.length === 0) return;

  const familiasChegando = uniqueFiles.map(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    if (['docx', 'doc'].includes(ext)) return 'word';
    if (['jpg', 'jpeg', 'png'].includes(ext)) return 'image';
    return 'pdf';
  });

  if (new Set(familiasChegando).size > 1) {
    if (typeof showToast === "function") showToast("Por favor, adicione apenas um tipo de material por vez (ex: só PDFs ou só Imagens).", "warning");
    document.getElementById('pdf-add-input').value = "";
    return;
  }

  const familiaChegando = familiasChegando[0];

  if (familiaChegando === 'word' || familiaChegando === 'image') {
    mostrarLoaderGlobal("A otimizar material na nuvem. Aguarde...");
  } else {
    mostrarLoaderGlobal("A processar páginas do documento...");
  }

  await new Promise(resolve => setTimeout(resolve, 150));

  try {
    let newPages = [];

    for (let file of uniqueFiles) {
      const ext = file.name.split('.').pop().toLowerCase();
      let arrayBuffer;
      let fileName = file.name;

      if (ext === 'pdf') {
        arrayBuffer = await file.arrayBuffer();
      } 
      else if (['docx', 'doc', 'jpg', 'jpeg', 'png'].includes(ext)) {
        mostrarLoaderGlobal(`A converter ${file.name} para o formato de estudo...`);
        
        const base64Data = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(file);
        });

        // Chamada ao Backend (Google Apps Script)
        const response = await executeBackendAction('CONVERT_TO_PDF', {
          fileData: base64Data,
          fileName: file.name
        });

        if (response && response.success) {
             const byteCharacters = atob(response.fileBase64);
             const bytes = new Uint8Array(byteCharacters.length);
             for (let i = 0; i < byteCharacters.length; i++) { bytes[i] = byteCharacters.charCodeAt(i); }
             arrayBuffer = bytes.buffer;
             fileName = "Material_" + file.name.split('.')[0] + ".pdf";
        } else {
          throw new Error("Falha ao converter o material na nuvem.");
        }
      } else { continue; }

      mostrarLoaderGlobal(`A gerar pré-visualização de ${fileName}...`);
      await new Promise(resolve => setTimeout(resolve, 50));

      const fileId = generateId();
      sourcePdfs[fileId] = arrayBuffer;
      
      const typedarray = new Uint8Array(arrayBuffer);
      const pdf = await pdfjsLib.getDocument({
        data: typedarray,
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
        cMapPacked: true,
        standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/standard_fonts/',
        useWorkerFetch: true
      }).promise;

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1.0 });
        const scale = 800 / viewport.width;

        const canvas = document.createElement("canvas");
        canvas.width = viewport.width * scale;
        canvas.height = viewport.height * scale;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport: page.getViewport({ scale }) }).promise;

        newPages.push({
          id: generateId(),
          sourceFileId: fileId,
          originalPageNum: i,
          filename: fileName,
          thumbnailBase64: canvas.toDataURL('image/jpeg', 0.8),
          rotation: 0,
          selected: false,
          isBlank: false
        });
      }
    }

    if (newPages.length > 0) {
      if(typeof saveState === 'function') saveState();
      if (insertIndex !== null && insertIndex < pdfState.length) {
        pdfState.splice(insertIndex, 0, ...newPages);
      } else {
        pdfState.push(...newPages);
      }
      renderPdfGrid();
    }

  } catch (err) {
    if (typeof showToast === "function") showToast(err.message || "Erro ao processar o material.", "error");
  } finally {
    const inputAdd = document.getElementById('pdf-add-input');
    if (inputAdd) inputAdd.value = ""; 
    ocultarLoaderGlobal();
  }
}


/* --------------------------------------------------------------------------
   3. INTERAÇÕES DE MESA (Lasso, Lupa e Controles de Zoom)
   -------------------------------------------------------------------------- */

function initLassoSelection() {
  const container = document.getElementById('pdf-preview-area');
  if (!container) return;
  
  let isSelecting = false;
  let startX, startY;
  let selectionBox = document.createElement('div');
  
  selectionBox.style.cssText = 'position:fixed; border:2px dashed var(--primary); background:rgba(59,130,246,0.15); display:none; pointer-events:none; z-index:9999;';
  document.body.appendChild(selectionBox);

  container.addEventListener('mousedown', (e) => {
    if (e.target.closest('.pdf-page-actions') || e.target.closest('.pdf-page-wrapper')) return;
    
    isSelecting = true;
    startX = e.clientX;
    startY = e.clientY;
    selectionBox.style.left = startX + 'px';
    selectionBox.style.top = startY + 'px';
    selectionBox.style.width = '0px';
    selectionBox.style.height = '0px';
    selectionBox.style.display = 'block';
  });

  window.addEventListener('mousemove', (e) => {
    if (!isSelecting) return;
    const currentX = e.clientX;
    const currentY = e.clientY;
    
    const x = Math.min(startX, currentX);
    const y = Math.min(startY, currentY);
    const w = Math.abs(currentX - startX);
    const h = Math.abs(currentY - startY);
    
    selectionBox.style.left = x + 'px';
    selectionBox.style.top = y + 'px';
    selectionBox.style.width = w + 'px';
    selectionBox.style.height = h + 'px';
  });

  window.addEventListener('mouseup', (e) => {
    if (!isSelecting) return;
    isSelecting = false;
    selectionBox.style.display = 'none';
    
    const rect = selectionBox.getBoundingClientRect();
    if (rect.width > 10 && rect.height > 10) {
      if(typeof saveState === 'function') saveState();
      const pages = document.querySelectorAll('.pdf-page-wrapper');
      pages.forEach(pageEl => {
        const pRect = pageEl.getBoundingClientRect();
        const intersecta = !(rect.right < pRect.left || rect.left > pRect.right || rect.bottom < pRect.top || rect.top > pRect.bottom);
        if (intersecta) {
          const id = pageEl.getAttribute('data-page-id');
          const pData = pdfState.find(p => p.id === id);
          if (pData) pData.selected = true;
        }
      });
      renderPdfGrid();
    }
  });
}

function iniciarLupaDoPdf() {
  const img = document.getElementById('img-large-preview');
  const lupa = document.getElementById('lupa-zoom');
  if (!img || !lupa) return;

  img.addEventListener('mousemove', function(e) {
    lupa.classList.remove('d-none');
    const bounds = img.getBoundingClientRect();
    const x = e.clientX - bounds.left;
    const y = e.clientY - bounds.top;
    
    const xp = (x / bounds.width) * 100;
    const yp = (y / bounds.height) * 100;

    lupa.style.left = (e.clientX - 75) + 'px';
    lupa.style.top = (e.clientY - 75) + 'px';
    lupa.style.backgroundImage = `url(${img.src})`;
    lupa.style.backgroundPosition = `${xp}% ${yp}%`;
    lupa.style.backgroundSize = `${bounds.width * 2.5}px ${bounds.height * 2.5}px`;
  });

  img.addEventListener('mouseleave', () => lupa.classList.add('d-none'));
}

function inicializarControleDeZoom() {
  console.log("Controles de Zoom Iniciados.");
}

let currentZoomIndex = 0; 
function showLargePreview(id) {
  const index = pdfState.findIndex(p => p.id === id);
  if (index > -1) {
    currentZoomIndex = index; 
    const page = pdfState[index];
    const img = document.getElementById('img-large-preview');
    const modalEl = document.getElementById('modalPdfPreview');
    if (!img || !modalEl) return;

    img.src = page.thumbnailBase64;
    img.setAttribute('data-rotation', page.rotation);
    img.style.transform = `rotate(${page.rotation}deg)`;
    img.classList.toggle('preview-rotate-90', page.rotation % 180 !== 0);

    document.getElementById('zoom-current-page').innerText = currentZoomIndex + 1;
    document.getElementById('zoom-total-pages').innerText = pdfState.length;
    modalEl.classList.add('show');
    modalEl.style.display = 'block';
  }
}

function navegarZoom(direcao, event) {
  if (event) event.stopPropagation();
  if (!pdfState || pdfState.length === 0) return;

  currentZoomIndex += direcao;
  if (currentZoomIndex < 0) currentZoomIndex = pdfState.length - 1;
  else if (currentZoomIndex >= pdfState.length) currentZoomIndex = 0;

  const page = pdfState[currentZoomIndex];
  const imgPreview = document.getElementById('img-large-preview');
  
  if(page && page.thumbnailBase64) {
      imgPreview.src = page.thumbnailBase64;
      imgPreview.setAttribute('data-rotation', page.rotation);
      imgPreview.style.transform = `rotate(${page.rotation}deg)`;
      imgPreview.classList.toggle('preview-rotate-90', page.rotation % 180 !== 0);
  }
  document.getElementById('zoom-current-page').innerText = currentZoomIndex + 1;
  document.getElementById('zoom-total-pages').innerText = pdfState.length;
}

// Atalhos de teclado para a Pré-visualização Ampliada
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('modalPdfPreview');
  if (modal && modal.classList.contains('show')) {
    if (e.key === 'ArrowLeft') navegarZoom(-1);
    if (e.key === 'ArrowRight') navegarZoom(1);
    if (e.key === 'Escape') {
      modal.classList.remove('show');
      modal.classList.add('d-none');
      modal.style.display = 'none';
    }
  }
});


/* --------------------------------------------------------------------------
   4. AÇÕES INDIVIDUAIS DOS MATERIAIS
   -------------------------------------------------------------------------- */

function rotatePage(id, direction) {
  const p = pdfState.find(x => x.id === id);
  if (p) { 
    if(typeof saveState === 'function') saveState(); 
    p.rotation = (p.rotation + direction) % 360; 
    renderPdfGrid(); 
  }
}

function deletePage(id) {
  const index = pdfState.findIndex(p => p.id === id);
  if (index === -1) return;
  if(typeof saveState === 'function') saveState(); 
  pdfState.splice(index, 1);
  renderPdfGrid();
}

function duplicatePage(id) {
  const index = pdfState.findIndex(p => p.id === id);
  if (index > -1) {
    if(typeof saveState === 'function') saveState(); 
    pdfState.splice(index + 1, 0, { ...pdfState[index], id: generateId() });
    renderPdfGrid();
  }
}

function togglePageSelection(id, event) {
  const index = pdfState.findIndex(x => x.id === id);
  if (index === -1) return;
  const isShift = event && event.shiftKey;
  
  if (isShift && lastSelectedIndex !== -1) {
    const start = Math.min(lastSelectedIndex, index);
    const end = Math.max(lastSelectedIndex, index);
    const targetState = !pdfState[index].selected; 
    for (let i = start; i <= end; i++) pdfState[i].selected = targetState;
  } else {
    pdfState[index].selected = !pdfState[index].selected;
  }
  lastSelectedIndex = index;
  renderPdfGrid();
}

function toggleSelectAll(isChecked) {
  pdfState.forEach(p => p.selected = isChecked);
  renderPdfGrid();
}

function excluirPaginasSelecionadas() {
  const selecionadas = pdfState.filter(p => p.selected);
  if (selecionadas.length === 0) return;
  if(typeof saveState === 'function') saveState(); 
  pdfState = pdfState.filter(p => !p.selected);
  renderPdfGrid();
  if(typeof showToast === "function") showToast(`${selecionadas.length} página(s) removida(s) da mesa.`, "success");
}


/* --------------------------------------------------------------------------
   5. RENDERIZAÇÃO DA GRELHA (DOM UPDATE)
   -------------------------------------------------------------------------- */

var draggedIndex = null; 

function renderPdfGrid() {
  const container = document.getElementById('pdf-preview-area');
  if (!container) return;

  // Estado Vazio (Empty State) Alinhado com Novo Design CSS Vars
  if (pdfState.length === 0) {
    container.innerHTML = `
      <div class="w-100 h-100 d-flex flex-column align-items-center justify-content-center text-muted py-5 empty-desk-bg rounded-4">
        <div class="floating-icon mb-3">
          <i class="material-icons text-primary" style="font-size: 84px; opacity: 0.8;">post_add</i>
        </div>
        <h4 class="fw-bold text-secondary mb-1">A sua mesa de estudos está vazia</h4>
        <p class="opacity-75 text-center mb-4" style="max-width: 320px;">Arraste e solte materiais aqui<br><small>(PDF, Word ou Imagens)</small></p>
        <button class="btn btn-light border border-secondary-subtle rounded-pill px-4 shadow-sm pulse-btn-add fw-semibold text-secondary d-flex align-items-center" onclick="document.getElementById('pdf-add-input').click()">
           <i class="material-icons align-middle fs-6 me-2">search</i> Procurar no Computador
        </button>
      </div>
    `;
    const btnOuvir = document.getElementById('btn-ouvir-mesa');
    if (btnOuvir) btnOuvir.style.display = 'none';
    if (window.LeitorTTS && typeof window.LeitorTTS.parar === 'function') window.LeitorTTS.parar(); 
    return;
  }

  container.innerHTML = "";
  // Modo cursor muda com base se é OCR/Extração
  const cursorStyle = appMode === 'extract' || appMode === 'ocr' ? 'pointer' : 'default';

  pdfState.forEach((page, index) => {
    const wrapper = document.createElement("div");
    wrapper.className = `pdf-page-wrapper ${page.selected ? 'selected' : ''}`;
    wrapper.draggable = true;
    wrapper.setAttribute('data-page-id', page.id);

    // Lógica Drag & Drop
    wrapper.ondragstart = () => { draggedIndex = index; wrapper.classList.add('dragging'); };
    wrapper.ondragend   = () => { wrapper.classList.remove('dragging'); };
    wrapper.ondragover  = (e) => { e.preventDefault(); wrapper.classList.add('drag-over'); };
    wrapper.ondragleave = () => { wrapper.classList.remove('drag-over'); };
    wrapper.ondrop = (e) => {
      e.preventDefault(); 
      wrapper.classList.remove('drag-over');
      if (draggedIndex === null || draggedIndex === index) return;
      if(typeof saveState === 'function') saveState();
      const item = pdfState.splice(draggedIndex, 1)[0];
      pdfState.splice(index, 0, item);
      renderPdfGrid();
    };

    const shortName = page.filename.length > 12 ? page.filename.substring(0, 10) + "..." : page.filename;

    let ocrBadge = page.extractedText ? 
      `<div class="badge bg-success position-absolute top-0 start-50 translate-middle-x mt-2 shadow-sm" 
             style="z-index: 100; cursor: pointer; padding: 6px 12px; border: 2px solid var(--bg-card);" 
             onclick="event.stopPropagation(); if(typeof abrirModalLeituraOcr === 'function') abrirModalLeituraOcr('${page.id}')" 
             title="Visualizar texto extraído">
         <i class="material-icons" style="font-size:14px; vertical-align: middle; margin-right: 2px;">text_snippet</i> TEXTO LIDO
       </div>` : '';

    wrapper.innerHTML = `
      ${ocrBadge}
      <input type="checkbox" class="pdf-extract-check" title="Selecionar" ${page.selected ? 'checked' : ''} onclick="event.stopPropagation(); togglePageSelection('${page.id}', event)">

      <div class="pdf-canvas-container" style="cursor: ${cursorStyle};" onclick="if(appMode === 'extract' || appMode === 'ocr') togglePageSelection('${page.id}', event)">
        <img src="${page.thumbnailBase64}" style="transform: rotate(${page.rotation}deg);">
        <div class="pdf-page-actions">
           <button class="pdf-action-btn" onclick="showLargePreview('${page.id}')" title="Ampliar"><i class="material-icons">zoom_in</i></button>
           <button class="pdf-action-btn" onclick="rotatePage('${page.id}', 90)" title="Rodar"><i class="material-icons">rotate_right</i></button>
           <button class="pdf-action-btn delete" onclick="deletePage('${page.id}')" title="Remover"><i class="material-icons">delete_outline</i></button>
        </div>
      </div>
      <div class="pdf-page-number">${shortName}<br><span class="opacity-75">Pág. ${page.originalPageNum}</span></div>
    `;

    container.appendChild(wrapper);
  });

  // Atualiza miniaturas no chat se necessário
  if (appMode === 'chat' && typeof prepararWorkspaceDoChat === 'function') {
    prepararWorkspaceDoChat();
  }

  // Visibilidade condicional do leitor se existir
  const btnOuvir = document.getElementById('btn-ouvir-mesa');
  if (btnOuvir) {
    const temTexto = pdfState.some(p => p.extractedText && p.extractedText.trim().length > 0);
    if (temTexto && appMode !== 'chat') {
      btnOuvir.style.display = 'inline-flex';
    } else {
      btnOuvir.style.display = 'none';
      if (window.LeitorTTS && typeof window.LeitorTTS.parar === 'function') window.LeitorTTS.parar(); 
    }
  }
}

/* --------------------------------------------------------------------------
   AÇÕES DE UTILITÁRIO E CONTROLE DE MESA
   -------------------------------------------------------------------------- */

function abrirFerramenta(toolId) {
  mostrarView('pdf-studio-view');
  if (typeof openTool === 'function') {
    openTool(toolId);
  }
}

function limparMesaConfirmar() {
  if (pdfState.length === 0) return;
  const modalEl = document.getElementById('modalConfirmarLimpeza');
  const bsModal = new bootstrap.Modal(modalEl);
  bsModal.show();
}

function executarLimpezaMesa() {
  if(typeof saveState === 'function') saveState();
  pdfState = [];
  renderPdfGrid();
  
  const modalEl = document.getElementById('modalConfirmarLimpeza');
  const bsModal = bootstrap.Modal.getInstance(modalEl);
  if (bsModal) bsModal.hide();
  
  if(typeof showToast === 'function') showToast("Mesa limpa com sucesso.", "success");
}

function adicionarPaginaEmBranco() {
  if(typeof saveState === 'function') saveState();
  
  // Cria um canvas em branco com proporção A4 (800x1131)
  const canvas = document.createElement("canvas");
  canvas.width = 800; 
  canvas.height = 1131; 
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  pdfState.push({
      id: generateId(),
      sourceFileId: 'blank',
      originalPageNum: 1,
      filename: 'Folha de Apontamentos',
      thumbnailBase64: canvas.toDataURL('image/jpeg', 1.0),
      rotation: 0,
      selected: false,
      isBlank: true
  });
  
  renderPdfGrid();
  if(typeof showToast === 'function') showToast("Folha em branco adicionada à mesa.", "info");
}

// Ligar o Slider de Zoom Inteligente à Grelha
document.addEventListener('DOMContentLoaded', () => {
  const zoomSlider = document.getElementById('zoom-slider');
  if (zoomSlider) {
      zoomSlider.addEventListener('input', (e) => {
          const area = document.getElementById('pdf-preview-area');
          if (area) {
              // Atualiza a variável CSS que controla a largura dos cards na mesa
              area.style.setProperty('--page-size', e.target.value + 'px');
          }
      });
  }
});

</script>
