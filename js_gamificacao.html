<script>
/* ==========================================================================
   MÓDULO 16: MOTOR DE GAMIFICAÇÃO, AGENDA E JORNADAS
   ========================================================================== */

/* --------------------------------------------------------------------------
   VARIÁVEIS GLOBAIS E REGRAS DINÂMICAS
   -------------------------------------------------------------------------- */
let globalXP = 0;
let globalLevel = 1;
const XP_POR_NIVEL = 100;
let minhasJornadas = []; 

let jAtiva = null;
let jornadaAtivaEditando = null; 

let RegrasMoogIA = { niveis: [], acoes: [], conquistas: [] };

/* --------------------------------------------------------------------------
   INICIALIZAÇÃO (BOOT DO MÓDULO)
   -------------------------------------------------------------------------- */
document.addEventListener('DOMContentLoaded', () => {
    const email = localStorage.getItem('usuario_email');
    
    google.script.run.withSuccessHandler((resp) => {
        if(resp.success) {
            RegrasMoogIA = resp.regras;
            SafeStorage.setItem('moogia_rules', JSON.stringify(resp.regras));
        }
    }).carregarRegrasGamificacaoBD();

    if (!email) {
        setTimeout(renderizarGridJornadas, 1500);
        return;
    }

    google.script.run.withSuccessHandler((resp) => {
        if (resp.success) {
            globalXP = resp.xp;
            globalLevel = resp.level;
            atualizarBarrasXP();
            
            // NOVA CHAMADA: Calcula e exibe o streak assim que o utilizador entra
            window.atualizarSequenciaDashboard();
        }
    }).carregarGamificacao(email);

    setTimeout(carregarJornadasAtivas, 1500); 
});

/* --------------------------------------------------------------------------
   LÓGICA DE GAMIFICAÇÃO DINÂMICA
   -------------------------------------------------------------------------- */
window.dispararAcaoGamificacao = function(gatilhoAcao, eventClick = null) {
    // NOVA CHAMADA: Grava a atividade fisicamente na tabela de logs da Nuvem
    const emailUsuario = localStorage.getItem('usuario_email');
    if (emailUsuario) {
        google.script.run.withSuccessHandler(() => {
            // Atualiza o painel de streak de forma assíncrona logo após registar a ação
            if (typeof window.atualizarSequenciaDashboard === 'function') window.atualizarSequenciaDashboard();
        }).registrarLogAcaoBD(emailUsuario, gatilhoAcao);
    }

    if (!RegrasMoogIA.acoes || RegrasMoogIA.acoes.length === 0) return;

    const regraAcao = RegrasMoogIA.acoes.find(a => a.gatilho === gatilhoAcao);
    if (!regraAcao) return; 

    let stats = JSON.parse(SafeStorage.getItem('moogia_stats') || '{}');
    let dataHoje = new Date().toISOString().split('T')[0];
    
    if (stats.data !== dataHoje) {
        stats = { data: dataHoje, contadores: {} }; 
    }
    
    stats.contadores[gatilhoAcao] = (stats.contadores[gatilhoAcao] || 0) + 1;
    let xpGanhoNestaAcao = regraAcao.pr;
    let pontosGanhosHoje = stats.contadores[gatilhoAcao] * regraAcao.pr;

    if (regraAcao.limite > 0 && pontosGanhosHoje > regraAcao.limite) {
        xpGanhoNestaAcao = 0;
    }

    SafeStorage.setItem('moogia_stats', JSON.stringify(stats));

    RegrasMoogIA.conquistas.forEach(conq => {
        if (conq.alvo === gatilhoAcao && stats.contadores[gatilhoAcao] === conq.meta) {
            let unlockedBadges = JSON.parse(SafeStorage.getItem('moogia_badges') || '[]');
            if (!unlockedBadges.includes(conq.id)) {
                unlockedBadges.push(conq.id);
                SafeStorage.setItem('moogia_badges', JSON.stringify(unlockedBadges));
                
                if (typeof showToast === 'function') {
                    showToast("🏆 CONQUISTA DESBLOQUEADA: " + conq.nome + "! +" + conq.bonus + " PR!", "warning");
                }
                ganharXP(conq.bonus, eventClick);
            }
        }
    });

    if (xpGanhoNestaAcao > 0) {
        ganharXP(xpGanhoNestaAcao, eventClick);
    }
};

function ganharXP(pontosGanhos, eventClick = null) {
    globalXP += pontosGanhos;
    let subiuNivel = false;

    const horaAtual = new Date().getHours();
    if (horaAtual >= 1 && horaAtual <= 4) {
        if (!localStorage.getItem('badge_corujinha')) {
            localStorage.setItem('badge_corujinha', 'true');
            if (typeof showToast === 'function') showToast("🏆 Conquista: Vaca Corujinha! Ganhaste +50 PR bónus por estudares de madrugada!", "warning");
            globalXP += 50; 
        }
    }

    while (globalXP >= (globalLevel * XP_POR_NIVEL)) {
        globalXP -= (globalLevel * XP_POR_NIVEL);
        globalLevel++;
        subiuNivel = true;
    }

    atualizarBarrasXP();
    
    const email = localStorage.getItem('usuario_email');
    if (email) {
        google.script.run.sincronizarGamificacao(email, globalXP, globalLevel);
    }
    
    if (subiuNivel) {
        if (typeof showToast === 'function') showToast("🎉 LEVEL UP! Subiste para o Nível " + globalLevel + "!", "success");
        animarVaquinhaLevelUp();
    }
    
    if (eventClick && pontosGanhos > 0) {
        criarPopupXP(eventClick.clientX, eventClick.clientY, pontosGanhos);
    }
}

function atualizarBarrasXP() {
    const maxXpAtual = globalLevel * XP_POR_NIVEL;
    const percentagem = Math.min((globalXP / maxXpAtual) * 100, 100);

    const headerText = document.getElementById('global-xp-text');
    const headerBar = document.getElementById('global-xp-bar');
    const headerLevel = document.getElementById('global-level-text');
    const painelLevel = document.getElementById('painel-level');
    const painelBar = document.getElementById('painel-xp-bar');
    const painelRank = document.getElementById('painel-rank');
    
    if(headerText) headerText.innerText = globalXP + " / " + maxXpAtual + " PR";
    if(headerBar) headerBar.style.width = percentagem + "%";
    if(headerLevel) headerLevel.innerText = globalLevel;
    if(painelLevel) painelLevel.innerText = globalLevel;
    if(painelBar) painelBar.style.width = percentagem + "%";
    
    let patenteAtual = "Estudante Novato";
    let imagemAtual = "https://i.ibb.co/5WHfDf0R/vaquinha.png"; 
    
    if (RegrasMoogIA.niveis && RegrasMoogIA.niveis.length > 0) {
        let nivelEncontrado = RegrasMoogIA.niveis.find(n => globalLevel <= n.teto);
        if (!nivelEncontrado) nivelEncontrado = RegrasMoogIA.niveis[RegrasMoogIA.niveis.length - 1];
        patenteAtual = nivelEncontrado.titulo;
        imagemAtual = nivelEncontrado.imagem;
    } else {
        if (globalLevel <= 5) patenteAtual = "Bezerro Desmamado";
        else if (globalLevel <= 10) patenteAtual = "Vaquinha de Presépio";
        else patenteAtual = "Vaquinha Mestre";
    }

    if(painelRank) painelRank.innerText = patenteAtual;

    const imgHeader = document.getElementById('vaquinha-avatar-header');
    const imgBig = document.getElementById('vaquinha-big-avatar');
    
    if (imgHeader && imgHeader.src !== imagemAtual) imgHeader.src = imagemAtual;
    if (imgBig && imgBig.src !== imagemAtual) {
        imgBig.style.opacity = 0;
        setTimeout(() => {
            imgBig.src = imagemAtual;
            imgBig.style.opacity = 1;
        }, 200);
    }
}

function criarPopupXP(x, y, pontos) {
    const pop = document.createElement('div');
    pop.className = 'xp-popup';
    pop.innerText = "+" + pontos + " PR";
    pop.style.left = x + "px";
    pop.style.top = y + "px";
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 1500);
}

function animarVaquinhaLevelUp() {
    const avatar1 = document.getElementById('vaquinha-avatar-header');
    const avatar2 = document.getElementById('vaquinha-big-avatar');
    if(avatar1) { avatar1.classList.remove('cow-level-up'); void avatar1.offsetWidth; avatar1.classList.add('cow-level-up'); }
    if(avatar2) { avatar2.classList.remove('cow-level-up'); void avatar2.offsetWidth; avatar2.classList.add('cow-level-up'); }
}

/* --------------------------------------------------------------------------
   LÓGICA DE VINCULAÇÃO (MESA -> JORNADA)
   -------------------------------------------------------------------------- */
const materiasAtivasMock = ["Engenharia de Software", "Banco de Dados", "Segurança da Informação"];

function abrirModalVincularJornada() {
    if (typeof pdfState === 'undefined' || !pdfState || pdfState.length === 0) {
        if (typeof showToast === 'function') showToast("A Mesa de Estudos está vazia. Adicione material primeiro.", "warning");
        return;
    }
    const select = document.getElementById('select-materia-vincular');
    if (select) {
        select.innerHTML = '';
        materiasAtivasMock.forEach(m => { select.innerHTML += '<option value="' + m + '">' + m + '</option>'; });
    }
    const modalEl = document.getElementById('modalVincularJornada');
    if (modalEl) new bootstrap.Modal(modalEl).show();
}

function confirmarVinculoJornada(event) {
    const select = document.getElementById('select-materia-vincular');
    const materia = select ? select.value : 'Geral';
    const modalEl = document.getElementById('modalVincularJornada');
    if (modalEl) { try { bootstrap.Modal.getInstance(modalEl).hide(); } catch(e) {} }
    if (typeof showToast === 'function') showToast("Materiais arquivados no Cofre de " + materia + ".", "success");
    ganharXP(15, event || { clientX: window.innerWidth/2, clientY: window.innerHeight/2 });
}

/* --------------------------------------------------------------------------
   GERADOR DA AGENDA INTELIGENTE E TAREFAS
   -------------------------------------------------------------------------- */
function gerarTarefasDaAgendaMock() {
    const container = document.getElementById('agenda-tasks-container');
    if(!container) return;
    const tarefas = [
        { id: 'task-1', tempo: '2h', materia: 'Engenharia de Software', topico: 'Padrões de Projeto (MVC, Singleton)', xp: 50 },
        { id: 'task-2', tempo: '1h', materia: 'Banco de Dados', topico: 'Revisão: Normalização (1FN a 3FN)', xp: 30 },
        { id: 'task-3', tempo: '30m', materia: 'Simulado IA', topico: 'Fazer 15 questões de Segurança', xp: 20 }
    ];
    let html = "";
    tarefas.forEach(t => {
        html += '<div class="card border border-primary-subtle shadow-sm rounded-4 p-3 d-flex flex-row align-items-center justify-content-between mb-3 bg-white" id="' + t.id + '">';
        html += '<div class="d-flex align-items-center gap-3">';
        html += '<div class="bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center fw-bold border border-primary" style="width: 50px; height: 50px;">' + t.tempo + '</div>';
        html += '<div><h5 class="fw-bold mb-1 text-dark">' + t.materia + '</h5><span class="text-muted small"><i class="material-icons align-middle text-secondary" style="font-size: 14px;">flag</i> Tópico: ' + t.topico + '</span></div>';
        html += '</div>';
        html += '<button class="btn btn-success rounded-pill px-4 fw-bold shadow-sm d-flex align-items-center gap-1" onclick="concluirTarefaAgenda(\'' + t.id + '\', ' + t.xp + ', event)"><i class="material-icons fs-6">check_circle</i> Concluir</button>';
        html += '</div>';
    });
    container.innerHTML = html;
}

window.concluirTarefaAgenda = function(taskId, xpReward, event) {
    const taskCard = document.getElementById(taskId);
    if (!taskCard || taskCard.classList.contains('task-card-done')) return; 
    taskCard.classList.add('task-card-done');
    
    const btn = taskCard.querySelector('button');
    if (btn) {
        btn.disabled = true;
        btn.classList.replace('btn-success', 'btn-outline-success');
        btn.innerHTML = '<i class="material-icons fs-6">done_all</i> Feito!';
    }
    
    // NOVA CHAMADA: Substitui ou acompanha o ganharXP antigo para registar o log na nuvem
    if (typeof dispararAcaoGamificacao === 'function') {
        dispararAcaoGamificacao('concluir_tarefa_agenda', event);
    }
};

/* --------------------------------------------------------------------------
   MOTOR DE JORNADAS (VISUALIZAÇÃO, CRIAÇÃO MANUAL E GESTÃO)
   -------------------------------------------------------------------------- */
function carregarJornadasAtivas() {
    const email = localStorage.getItem('usuario_email');
    if(!email) { renderizarGridJornadas(); return; }
    
    const grid = document.getElementById('grid-jornadas-ativas');
    if (grid && (!minhasJornadas || minhasJornadas.length === 0)) {
        grid.innerHTML = '<div class="col-12 text-center py-5 text-muted border rounded-4 bg-white shadow-sm" style="border-style: dashed !important;"><div class="spinner-border text-primary spinner-border-sm mb-2" role="status"></div><p class="mb-0 small">A sincronizar com a base de dados...</p></div>';
    }
    google.script.run
        .withSuccessHandler(resp => {
            if(resp.success && resp.jornadas) minhasJornadas = resp.jornadas.map(j => ({ id: j.id, dataCriacao: j.dataCriacao, ...j.dados }));
            else minhasJornadas = []; 
            renderizarGridJornadas(); 
        })
        .withFailureHandler(err => {
            console.warn("Ligação à BD falhou.");
            minhasJornadas = []; renderizarGridJornadas(); 
        })
        .carregarJornadasBD(email);
}

function renderizarGridJornadas() {
    const grid = document.getElementById('grid-jornadas-ativas');
    if(!grid) return;
    
    if(!minhasJornadas || minhasJornadas.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center py-5 text-muted border rounded-4 bg-white shadow-sm" style="border-style: dashed !important;"><i class="material-icons mb-3" style="font-size: 48px; opacity: 0.3;">route</i><h5 class="fw-bold">Nenhuma jornada ativa.</h5><p class="mb-0 small">Clique em Criar Manualmente para iniciar a sua organização.</p></div>';
        return;
    }
    
    let htmlFinal = "";
    minhasJornadas.forEach(j => {
        const numMaterias = j.materias ? j.materias.length : 0;
        const totalMateriais = j.materias ? j.materias.reduce((acc, mat) => acc + (mat.materiais ? mat.materiais.length : 0), 0) : 0;
        let statusRoteiro = j.temRoteiro 
            ? '<span class="text-success small fw-bold"><i class="material-icons align-middle" style="font-size: 14px;">check_circle</i> Roteiro Ativo</span>'
            : '<span class="text-warning small fw-bold"><i class="material-icons align-middle" style="font-size: 14px;">pending_actions</i> Sem Roteiro</span>';

        let safeId = escapeHtml(j.id);
        let safeTitulo = escapeHtml(j.titulo || 'Nova Jornada');
        let safeTipo = escapeHtml(j.tipo || 'Geral');

        let card = '<div class="col-md-6 col-lg-4"><div class="card border-0 shadow-sm rounded-4 p-4 h-100 bg-white transition-hover">';
        card += '<div class="d-flex justify-content-between align-items-start mb-3"><span class="badge bg-primary-subtle text-primary rounded-pill fw-bold">' + safeTipo + '</span>';
        card += '<div class="dropdown"><button class="btn btn-sm btn-light rounded-circle text-muted p-1" data-bs-toggle="dropdown" aria-expanded="false"><i class="material-icons" style="font-size:18px; vertical-align:middle;">more_vert</i></button>';
        card += '<ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3 p-1"><li><a class="dropdown-item d-flex align-items-center gap-2 small py-2 rounded-2" href="#" onclick="executarRenomearJornada(\'' + safeId + '\', \'' + safeTitulo + '\')"><i class="material-icons text-primary" style="font-size:16px;">edit</i> Renomear Jornada</a></li>';
        card += '<li><hr class="dropdown-divider opacity-25"></li><li><a class="dropdown-item d-flex align-items-center gap-2 small text-danger py-2 rounded-2" href="#" onclick="executarExcluirJornada(\'' + safeId + '\', \'' + safeTitulo + '\')"><i class="material-icons text-danger" style="font-size:16px;">delete</i> Arquivar/Excluir</a></li></ul></div></div>';
        card += '<h5 class="fw-bold text-dark mb-2" style="line-height: 1.3;">' + safeTitulo + '</h5>';
        card += '<div class="d-flex flex-wrap gap-3 mt-3 text-muted small"><span title="Matérias Mapeadas"><i class="material-icons align-middle" style="font-size: 16px;">category</i> ' + numMaterias + ' áreas</span><span title="Materiais no Cofre"><i class="material-icons align-middle" style="font-size: 16px;">folder_zip</i> ' + totalMateriais + ' docs</span></div>';
        card += '<hr class="opacity-25 my-3"><div class="d-flex justify-content-between align-items-center mt-auto">' + statusRoteiro + '<button class="btn btn-primary btn-sm rounded-pill px-4 fw-bold shadow-sm" onclick="abrirGerenciadorJornada(\'' + safeId + '\')">Acessar Jornada</button></div></div></div>';
        
        htmlFinal += card;
    });
    grid.innerHTML = htmlFinal;
}

// ==========================================================================
// RENDERIZADOR REMOTO E INTEGRADO DO CELEIRO DE MATERIAIS REAL
// ==========================================================================
window.abrirGerenciadorJornada = function(id) {
    const jornada = minhasJornadas.find(j => j.id === id);
    if(!jornada) return;
    jAtiva = jnodeClone(jornada); 
    jornadaAtivaEditando = jAtiva;

    document.getElementById('painel-jor-nome').innerText = jAtiva.titulo || 'Jornada';
    document.getElementById('painel-jor-tipo').innerText = jAtiva.tipo || 'Geral';

    const seletorMateria = document.getElementById('jor-material-materia-seletor');
    if(seletorMateria) {
        let optHtml = "";
        (jAtiva.materias || []).forEach((m, i) => { 
            // CORTADOR DE TEXTO PARA O SELECT DA DISCIPLINA
            let nomeCortado = m.nome.length > 50 ? escapeHtml(m.nome.substring(0, 50)) + '...' : escapeHtml(m.nome);
            optHtml += '<option value="' + i + '" title="' + escapeHtml(m.nome) + '">' + nomeCortado + '</option>'; 
        });
        seletorMateria.innerHTML = optHtml;
        atualizarSeletorTopicosMateriais();
    }

    renderizarMateriaisDoCeleiro();
    renderizarArvoreDisciplinas();

    const modalEl = document.getElementById('modalPainelJornada');
    if(modalEl) new bootstrap.Modal(modalEl).show();
};

window.atualizarSeletorTopicosMateriais = function() {
    const seletorMateria = document.getElementById('jor-material-materia-seletor');
    const containerTopicos = document.getElementById('jor-material-topicos-container');
    if(!seletorMateria || !containerTopicos) return;

    const idx = seletorMateria.value;
    if(idx === "" || !jAtiva.materias[idx]) {
        containerTopicos.innerHTML = '<small class="text-muted p-2 d-block">Nenhuma disciplina cadastrada.</small>';
        return;
    }

    const materia = jAtiva.materias[idx];
    if(!materia.topicos || materia.topicos.length === 0) {
        containerTopicos.innerHTML = '<small class="text-muted p-2 d-block">Esta disciplina não possui tópicos mapeados.</small>';
        return;
    }

    let topHTML = "";
    materia.topicos.forEach((t, i) => {
        // CORTADOR DE TEXTO PARA AS CHECKBOXES
        let labelCortada = t.length > 55 ? escapeHtml(t.substring(0, 55)) + '...' : escapeHtml(t);
        topHTML += '<div class="form-check small mb-1"><input class="form-check-input jor-topic-check" type="checkbox" value="' + escapeHtml(t) + '" id="chk-topico-' + i + '"><label class="form-check-label text-dark d-inline-block text-truncate" style="max-width: 90%; vertical-align: middle;" title="' + escapeHtml(t) + '" for="chk-topico-' + i + '">' + labelCortada + '</label></div>';
    });
    containerTopicos.innerHTML = topHTML;
};

function renderizarMateriaisDoCeleiro() {
    const listaHtml = document.getElementById('jor-lista-materiais-cofre');
    const badgeTotal = document.getElementById('jor-badge-total-materiais');
    if(!listaHtml) return;

    let totalItens = 0;
    let poolCards = "";

    (jAtiva.materias || []).forEach((m, mIdx) => {
        if(m.materiais && m.materiais.length > 0) {
            m.materiais.forEach((mat, matIdx) => {
                totalItens++;
                let icon = "insert_drive_file";
                let iconClass = "bg-secondary text-white";
                if(mat.tipo === 'pdf') { icon = "picture_as_pdf"; iconClass = "bg-danger-subtle text-danger"; }
                else if(mat.tipo === 'image') { icon = "image"; iconClass = "bg-success-subtle text-success"; }
                else if(mat.tipo === 'link') { icon = "play_arrow"; iconClass = "bg-danger text-white"; }
                else if(mat.tipo === 'docx') { icon = "description"; iconClass = "bg-primary-subtle text-primary"; }

                let badgesTopicos = "";
                (mat.topicos || []).forEach(t => { 
                    // CORTADOR DE TEXTO PARA AS TAGS/BADGES DA BIBLIOTECA
                    let badgeText = t.length > 35 ? escapeHtml(t.substring(0, 35)) + '...' : escapeHtml(t);
                    badgesTopicos += '<span class="badge bg-light text-secondary border text-truncate d-inline-block align-middle" style="max-width: 220px; font-size:10px; margin-bottom:2px;" title="' + escapeHtml(t) + '">' + badgeText + '</span> '; 
                });

                let itemHtml = '<div class="list-group-item border border-light shadow-sm bg-transparent px-3 py-3 d-flex flex-column gap-2 mb-2 rounded-3 bg-white transition-hover">';
                itemHtml += '<div class="d-flex justify-content-between align-items-start"><div class="d-flex gap-3 align-items-center" style="max-width: 75%;">';
                itemHtml += '<div class="rounded-3 d-flex align-items-center justify-content-center p-2 ' + iconClass + '"><i class="material-icons">' + icon + '</i></div>';
                itemHtml += '<div class="overflow-hidden"><h6 class="mb-0 fw-bold text-dark text-truncate" title="' + escapeHtml(mat.nome) + '">' + escapeHtml(mat.nome) + '</h6>';
                itemHtml += '<small class="text-muted d-flex align-items-center gap-1" style="font-size:11px;"><i class="material-icons" style="font-size: 12px;">event</i> Indexado em: ' + (mat.data || 'Recente') + '</small></div></div>';
                itemHtml += '<div class="d-flex gap-1"><button class="btn btn-primary btn-sm rounded-pill px-3 fw-bold shadow-sm d-flex align-items-center gap-1" onclick="levarMaterialParaMesa(\'' + escapeHtml(mat.url) + '\', \'' + escapeHtml(mat.nome) + '\', \'' + mat.tipo + '\')"><i class="material-icons fs-6">build_circle</i> Estudar</button>';
                itemHtml += '<button class="btn btn-sm btn-light border text-danger p-1 rounded-circle" onclick="executarExcluirMaterialCeleiro(' + mIdx + ', ' + matIdx + ')" title="Excluir Material"><i class="material-icons fs-6">delete</i></button></div></div>';
                itemHtml += '<div class="d-flex flex-wrap align-items-center gap-1 mt-1 border-top pt-2"><span class="badge bg-primary-subtle text-primary border text-truncate d-inline-block align-middle" style="max-width: 150px; font-size:10px; margin-bottom:2px;" title="Módulo: ' + escapeHtml(m.nome) + '">Módulo: ' + escapeHtml(m.nome) + '</span> ' + (badgesTopicos || '<span class="text-muted" style="font-size:10px; font-style:italic;">Sem tópicos vinculados</span>') + '</div></div>';
                
                poolCards += itemHtml;
            });
        }
    });

    if(badgeTotal) badgeTotal.innerText = totalItens + " Itens Mapeados";

    if(poolCards === "") {
        listaHtml.innerHTML = '<div class="text-center p-5 text-muted"><i class="material-icons opacity-25 mb-2" style="font-size:40px;">inventory</i><p class="small m-0">Celeiro vazio. Use o painel à esquerda para indexar apostilas ou vídeos!</p></div>';
    } else {
        listaHtml.innerHTML = poolCards;
    }
}

// 3. AÇÃO DE INTEGRAÇÃO FANTÁSTICA: "Levar para a Mesa" (VERSÃO REAL VIA DRIVE)
window.levarMaterialParaMesa = function(url, nome, tipo) {
    // INJEÇÃO DE CONTEXTO: Identifica e salva a Jornada e a Matéria no localStorage para a IA ler depois
    if (typeof jAtiva !== 'undefined' && jAtiva) {
        localStorage.setItem('jornada_ativa_nome', jAtiva.titulo || 'Estudo Independente');
        
        // Varre as matérias da jornada para descobrir a qual delas este material pertence
        const materiaEncontrada = (jAtiva.materias || []).find(m => 
            (m.materiais || []).some(mat => mat.url === url || mat.id === url || mat.nome === nome)
        );
        
        if (materiaEncontrada) {
            localStorage.setItem('materia_ativa_nome', materiaEncontrada.nome || 'Matéria Não Especificada');
            localStorage.setItem('modulo_ativo_nome', materiaEncontrada.nome || 'Módulo Geral');
        }
    }

    // 1. Esconde o Quartel General da Jornada
    const modalEl = document.getElementById('modalPainelJornada');
    if(modalEl) { try { bootstrap.Modal.getInstance(modalEl).hide(); } catch(e){} }
    
    // 2. Muda para a View da Mesa
    if(typeof mostrarView === 'function') mostrarView('pdf-studio-view');
    
    // 3. Se for um link web comum (YouTube/Site), abre noutra aba
    if(tipo === 'link') {
        if(typeof showToast === 'function') showToast("Link aberto! Cole o conteúdo no Copiloto IA do Chat.", "success");
        window.open(url, '_blank');
        return;
    }

    if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal(`Transferindo [${nome}] do Celeiro...`);
    
    // 4. Puxa o Ficheiro Físico do Google Drive
    google.script.run
        .withSuccessHandler(resp => {
            if (resp.success) {
                if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal(`Processando páginas de [${nome}]...`);
                
                // Converte a string Base64 devolvida pelo servidor de volta num Blob/File Array nativo
                const byteCharacters = atob(resp.base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                
                // Cria um arquivo Físico no navegador
                const file = new File([byteArray], nome, { type: resp.mimeType });
                
                // Atira o ficheiro para o Motor Original da Mesa de Estudos!
                if (typeof loadPdfs === 'function') {
                    loadPdfs([file]);
                    if(typeof forcarNovaMooDica === 'function') setTimeout(forcarNovaMooDica, 800);
                } else {
                    if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
                }
            } else {
                if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
                alert("Erro ao puxar o arquivo do Celeiro: " + resp.error);
            }
        })
        .withFailureHandler(err => {
            if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
            alert("Falha de rede ao tentar acessar o Celeiro.");
        })
        .obterFicheiroDoDriveBase64(url);
};

window.executarUploadFicheiroCeleiro = function(files) {
    if(!files || files.length === 0) return;
    const seletorMateria = document.getElementById('jor-material-materia-seletor');
    const mIdx = seletorMateria.value;
    
    if(mIdx === "") { alert("Por favor, crie ou selecione uma disciplina para albergar o arquivo."); return; }

    const file = files[0];
    const extension = file.name.split('.').pop().toLowerCase();
    let tipoCalculado = 'pdf';
    if(['png','jpg','jpeg'].includes(extension)) tipoCalculado = 'image';
    if(['docx','doc'].includes(extension)) tipoCalculado = 'docx';

    const checkedBoxes = document.querySelectorAll('.jor-topic-check:checked');
    const topicosMapeados = Array.from(checkedBoxes).map(cb => cb.value);

    mostrarLoaderGlobal("Enviando arquivo para a pasta MoogIA_Assets no seu Drive...");
    
    const reader = new FileReader();
    reader.onloadend = function() {
        google.script.run.withSuccessHandler(resp => {
            if(resp.success) {
                if(!jAtiva.materias[mIdx].materiais) jAtiva.materias[mIdx].materiais = [];
                jAtiva.materias[mIdx].materiais.push({
                    id: 'doc-' + Math.random().toString(36).substr(2, 9),
                    nome: file.name,
                    tipo: tipoCalculado,
                    url: resp.url,
                    topicos: topicosMapeados,
                    data: new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'})
                });
                salvarModificacoesDoCeleiroNoServidor("Ficheiro indexado e mapeado com sucesso!");
                
                // GATILHO DA GAMIFICAÇÃO INJETADO AQUI
                if (typeof dispararAcaoGamificacao === 'function') dispararAcaoGamificacao('upload_pdf');
                
                document.getElementById('jor-upload-file-real').value = ""; 
            } else {
                ocultarLoaderGlobal();
                alert("Erro físico de upload no Drive: " + resp.error);
            }
        }).uploadImagemAsset(reader.result, file.name);
    };
    reader.readAsDataURL(file);
};

function salvarJornadaManual() {
    const email = localStorage.getItem('usuario_email');
    if(!email) return;

    const nome = document.getElementById('manual-jornada-nome').value.trim();
    const tipo = document.getElementById('manual-jornada-tipo').value;
    const nivel = document.getElementById('manual-jornada-nivel').value; 
    const materiasStr = document.getElementById('manual-jornada-materias').value.trim();

    if(!nome || !materiasStr) {
        if(typeof showToast === 'function') showToast("Preencha o nome e pelo menos uma matéria.", "warning"); 
        return;
    }

    const arrayMaterias = materiasStr.split(',')
        .map(m => m.trim())
        .filter(m => m.length > 0)
        .map(m => ({ nome: m, peso: 1, materiais: [], topicos: [] }));

    const novaJornadaDados = {
        titulo: nome,
        tipo: tipo,
        nivel: nivel, 
        dataProva: '',
        temRoteiro: false,
        materias: arrayMaterias
    };

    if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("A gravar Jornada...");

    google.script.run
        .withSuccessHandler(resp => {
            if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
            if (resp.success) {
                const modalEl = document.getElementById('modalJornadaManual');
                if (modalEl) { try { bootstrap.Modal.getInstance(modalEl).hide(); } catch(e){} }
                carregarJornadasAtivas(); 
                if(typeof showToast === 'function') showToast("Jornada criada com sucesso!", "success");
                ganharXP(20, {clientX: window.innerWidth/2, clientY: window.innerHeight/2});
            } else {
                if(typeof showToast === 'function') showToast("Erro: " + resp.error, "error");
            }
        })
        .withFailureHandler(err => {
            if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
            if(typeof showToast === 'function') showToast("Falha de comunicação com o servidor.", "error");
        })
        .salvarJornadaBD(email, novaJornadaDados);
}

if (typeof escapeHtml !== 'function') {
    window.escapeHtml = function(unsafe) {
        return (unsafe || "").toString()
             .replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
    };
}

let mooDicaTimeout;

window.exibirMooDicaAtual = function(toolId = null) {
    const balao = document.getElementById('moodicas-balao');
    const texto = document.getElementById('moodicas-texto');
    if (!balao || !texto) return;
    
    let contexto = toolId || (typeof currentTool !== 'undefined' && currentTool ? currentTool : 'default');
    if (!moodicasDB[contexto]) contexto = 'default';
    
    const banco = moodicasDB[contexto];
    const dicaAleatoria = banco[Math.floor(Math.random() * banco.length)];
    
    texto.innerHTML = "<strong>MooDica:</strong> " + dicaAleatoria;
    
    balao.classList.remove('show');
    clearTimeout(mooDicaTimeout);
    
    setTimeout(() => {
        balao.classList.add('show');
        mooDicaTimeout = setTimeout(() => {
            balao.classList.remove('show');
        }, 9000); 
    }, 150);
};

window.forcarNovaMooDica = function() {
    window.exibirMooDicaAtual(null); 
};

const obterUrlImagemSegura = (url) => {
    if (!url || typeof url !== 'string') return "https://i.ibb.co/5WHfDf0R/vaquinha.png";
    const urlLimpa = url.trim();
    if (urlLimpa.startsWith('http://') || urlLimpa.startsWith('https://')) return urlLimpa;
    return "https://i.ibb.co/5WHfDf0R/vaquinha.png";
};

document.addEventListener('DOMContentLoaded', () => {

window.abrirMeuPerfil = function() {
    if(typeof mostrarView === 'function') mostrarView('perfil-view');
    
    const email = localStorage.getItem('usuario_email') || '';
    const nome = localStorage.getItem('usuario_nome') || 'Estudante';
    
    // 1. Renderização Imediata (Identidade e Cache Local)
    document.getElementById('perfil-nome').innerText = nome;
    document.getElementById('perfil-input-nome').value = nome;
    document.getElementById('perfil-email').innerText = email;
    document.getElementById('perfil-avatar-inicial').innerText = nome.charAt(0).toUpperCase();
    
    document.getElementById('perfil-xp-total').innerText = (typeof globalXP !== 'undefined' ? globalXP : 0) + " PR";
    document.getElementById('perfil-nivel').innerText = (typeof globalLevel !== 'undefined' ? globalLevel : 1);
    const rankEl = document.getElementById('painel-rank');
    document.getElementById('perfil-rank').innerText = rankEl ? rankEl.innerText : 'Vaquinha Estudante';
    
    // 2. Prepara a UI com Loaders para aguardar o Banco de Dados
    document.getElementById('perfil-jornadas-lista').innerHTML = '<div class="text-center p-4"><div class="spinner-border spinner-border-sm text-primary mb-2"></div><p class="small text-muted m-0">Sincronizando jornadas...</p></div>';
    document.getElementById('perfil-logs-lista').innerHTML = '<div class="text-center p-4"><div class="spinner-border spinner-border-sm text-secondary mb-2"></div><p class="small text-muted m-0">Buscando histórico...</p></div>';
    
    // 3. Chamada Única e Robusta para a Nuvem
    google.script.run.withSuccessHandler(resp => {
        if(resp.success) {
            const server = resp.dados;
            
            // Renderiza Estatísticas Precisas
            document.getElementById('stat-resumos').innerText = server.stats.resumos;
            document.getElementById('stat-quizzes').innerText = server.stats.quizzes;
            document.getElementById('stat-mapas').innerText = server.stats.mapas;
            document.getElementById('stat-cartoes').innerText = server.stats.cartoes;
            
            // Renderiza Jornadas
            const divJornadas = document.getElementById('perfil-jornadas-lista');
            if (server.jornadas.length > 0) {
                let jorHtml = '<div class="d-flex flex-column gap-3">';
                server.jornadas.forEach(j => {
                    jorHtml += `
                    <div class="border rounded-3 p-3 bg-light transition-hover shadow-sm">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h6 class="fw-bold text-dark m-0 d-flex align-items-center gap-2">
                                <i class="material-icons text-primary" style="font-size: 18px;">map</i> ${escapeHtml(j.titulo)}
                            </h6>
                            <span class="badge bg-primary-subtle text-primary border">${escapeHtml(j.tipo)}</span>
                        </div>
                        <div class="small text-muted d-flex gap-3">
                            <span><i class="material-icons align-middle" style="font-size: 14px;">menu_book</i> ${j.qtdMaterias} Matérias</span>
                            <span><i class="material-icons align-middle" style="font-size: 14px;">event</i> Nível: ${escapeHtml(j.nivel)}</span>
                        </div>
                    </div>`;
                });
                jorHtml += '</div>';
                divJornadas.innerHTML = jorHtml;
            } else {
                divJornadas.innerHTML = '<div class="text-center p-4 text-muted"><i class="material-icons opacity-25 mb-2" style="font-size:40px;">route</i><p class="small m-0">Nenhuma jornada criada ainda.</p></div>';
            }
            
            // Renderiza Logs
            const ulLogs = document.getElementById('perfil-logs-lista');
            if (server.logs.length > 0) {
                let html = '';
                server.logs.forEach(log => {
                    const d = new Date(log.dataIso);
                    const dataStr = d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
                    
                    let acaoAmigavel = log.acao;
                    let icone = 'bolt';
                    let cor = 'primary';
                    
                    if(log.acao === 'upload_pdf') { acaoAmigavel = 'Indexou um novo material'; icone = 'cloud_upload'; cor = 'info'; }
                    else if(log.acao === 'gerar_summarize') { acaoAmigavel = 'Gerou um Resumo IA'; icone = 'auto_awesome'; cor = 'purple'; }
                    else if(log.acao === 'gerar_quiz') { acaoAmigavel = 'Gerou um Simulado IA'; icone = 'school'; cor = 'success'; }
                    else if(log.acao === 'gerar_mindmap') { acaoAmigavel = 'Criou um Mapa Mental'; icone = 'account_tree'; cor = 'danger'; }
                    else if(log.acao === 'gerar_flashcards') { acaoAmigavel = 'Gerou Flashcards'; icone = 'style'; cor = 'warning'; }
                    else if(log.acao === 'concluir_tarefa_agenda') { acaoAmigavel = 'Cumpriu missão da agenda'; icone = 'check_circle'; cor = 'success'; }
                    else if(log.acao === 'criar_jornada') { acaoAmigavel = 'Criou nova Jornada'; icone = 'route'; cor = 'primary'; }
                    else if(log.acao === 'organizar_acervo') { acaoAmigavel = 'Reorganizou metadados do acervo'; icone = 'edit_note'; cor = 'secondary'; }
                    
                    html += `
                    <li class="list-group-item border-bottom d-flex align-items-center gap-3 py-3 px-4 transition-hover">
                        <div class="bg-${cor}-subtle text-${cor} p-2 rounded-circle d-flex align-items-center justify-content-center shadow-sm"><i class="material-icons fs-6">${icone}</i></div>
                        <div>
                            <div class="fw-bold text-dark small">${acaoAmigavel}</div>
                            <div class="text-muted" style="font-size: 11px;">${dataStr}</div>
                        </div>
                    </li>`;
                });
                ulLogs.innerHTML = html;
            } else {
                ulLogs.innerHTML = '<div class="text-muted small p-4 text-center">Nenhum histórico recente encontrado. A sua evolução começa agora!</div>';
            }
        }
    }).buscarDadosPerfilBD(email);
};

/* --- FUNÇÕES DE EDIÇÃO DO PERFIL --- */
window.toggleEditPerfil = function() {
    const displayMode = document.getElementById('perfil-display-mode');
    const editMode = document.getElementById('perfil-edit-mode');
    if (displayMode.style.display === 'none') {
        displayMode.style.display = 'block';
        editMode.style.display = 'none';
    } else {
        displayMode.style.display = 'none';
        editMode.style.display = 'block';
        document.getElementById('perfil-input-nome').focus();
    }
};

window.salvarEdicaoPerfil = function() {
    const novoNome = document.getElementById('perfil-input-nome').value.trim();
    if(!novoNome) {
        if(typeof showToast === 'function') showToast("O nome não pode ficar vazio.", "warning");
        return;
    }
    
    const email = localStorage.getItem('usuario_email');
    if(typeof mostrarLoaderGlobal === 'function') mostrarLoaderGlobal("A atualizar o perfil na base de dados...");
    
    google.script.run.withSuccessHandler(resp => {
        if(typeof ocultarLoaderGlobal === 'function') ocultarLoaderGlobal();
        if(resp.success) {
            // Atualiza localmente e reflete visualmente
            localStorage.setItem('usuario_nome', novoNome);
            if(typeof SafeStorage !== 'undefined') SafeStorage.setItem('usuario_nome', novoNome);
            
            document.getElementById('perfil-nome').innerText = novoNome;
            document.getElementById('perfil-avatar-inicial').innerText = novoNome.charAt(0).toUpperCase();
            
            // Atualiza a saudação do Dashboard também
            const saudacaoDash = document.getElementById('dash-greeting');
            if(saudacaoDash) {
                saudacaoDash.innerHTML = `<span class="texto-gradiente-roxo">Olá, ${novoNome}!</span> 👋`;
            }
            
            window.toggleEditPerfil();
            if(typeof showToast === 'function') showToast("Perfil atualizado com sucesso!", "success");
        } else {
            alert("Erro ao atualizar o perfil: " + resp.error);
        }
    }).atualizarPerfilUsuarioBD(email, novoNome);
};
